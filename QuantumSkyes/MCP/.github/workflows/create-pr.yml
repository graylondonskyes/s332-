name: MCP Create PR via repository_dispatch

on:
  repository_dispatch:
    types: [create-pr]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dispatch secret
        if: ${{ secrets.MCP_DISPATCH_SECRET != '' }}
        env:
          EXPECTED_SECRET: ${{ secrets.MCP_DISPATCH_SECRET }}
          PROVIDED_SECRET: ${{ github.event.client_payload.dispatch_secret }}
        run: |
          if [ "$PROVIDED_SECRET" != "$EXPECTED_SECRET" ]; then
            echo "Invalid MCP dispatch secret"
            exit 1
          fi

      - name: Create or update file and open PR
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const payload = context.payload.client_payload || {};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = payload.path || 'README.md';
            const content = Buffer.from(payload.content || 'Automated update').toString('base64');
            const branch = payload.branch || `mcp/auto-${Date.now()}`;
            const message = payload.message || `MCP update: ${path}`;

            // create branch from default
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const sha = ref.data.object.sha;
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha });
            } catch (e) {
              // branch may already exist
            }

            // create/update file
            const params = { owner, repo, path, message, content, branch };
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing.data) && existing.data.sha) params.sha = existing.data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            await github.rest.repos.createOrUpdateFileContents(params);

            // open PR
            const pr = await github.rest.pulls.create({ owner, repo, head: branch, base: defaultBranch, title: message, body: payload.body || 'Created by MCP workflow' });
            core.setOutput('pr_url', pr.data.html_url);

      - name: Output PR URL
        run: echo "PR created: ${{ steps.create-pr.outputs.pr_url }}"
