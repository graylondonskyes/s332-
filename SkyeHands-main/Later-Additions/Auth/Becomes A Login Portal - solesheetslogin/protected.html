<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>SOLE Sheets Login Portal — Shell Demo</title>
  <style>
    :root{--text:rgba(255,255,255,.94);--muted:rgba(255,255,255,.68);--gold:#ffcf5a;--purple:#7c3aed;--blue:#3b82f6}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:radial-gradient(1100px 700px at 18% 12%, rgba(124,58,237,.25), transparent 60%),radial-gradient(900px 600px at 82% 18%, rgba(59,130,246,.18), transparent 60%),radial-gradient(900px 700px at 50% 88%, rgba(255,207,90,.14), transparent 60%),linear-gradient(180deg, #060712, #05060a 55%, #04040a);padding:24px}.wrap{max-width:1040px;margin:0 auto;display:grid;gap:18px}.card{background:linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.055));border:1px solid rgba(255,255,255,.14);border-radius:20px;box-shadow:0 30px 70px rgba(0,0,0,.65);padding:18px}.title{font-size:24px;font-weight:820}.sub{margin-top:8px;color:var(--muted);line-height:1.7}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button,a{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:rgba(255,255,255,.92);text-decoration:none;border-radius:14px;padding:11px 13px;font-weight:760;cursor:pointer}button.primary,a.primary{border-color:rgba(255,207,90,.35);background:linear-gradient(135deg, rgba(255,207,90,.22), rgba(124,58,237,.14))}pre{margin:0;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.24);overflow:auto;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Static Shell Demo</div>
      <div class="sub">This page is intentionally just a client-side shell. It checks the active session with <span style="font-family:ui-monospace">/.netlify/functions/me</span>. Real sensitive surfaces should live behind <a href="/app">/app</a>.</div>
      <div class="btns">
        <a class="primary" href="/app">Open real protected route</a>
        <a href="/index.html">Back to portal</a>
      </div>
    </div>
    <div class="card">
      <pre id="out">Checking session…</pre>
    </div>
  </div>
  <script>
    (async () => {
      const out = document.getElementById('out');
      try {
        const res = await fetch('/.netlify/functions/me', { credentials: 'include' });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
        if (!data.ok) {
          location.href = '/index.html?next=/protected.html';
        }
      } catch (err) {
        out.textContent = JSON.stringify({ ok:false, error: err.message || 'Request failed' }, null, 2);
      }
    })();
  </script>
</body>
</html>
