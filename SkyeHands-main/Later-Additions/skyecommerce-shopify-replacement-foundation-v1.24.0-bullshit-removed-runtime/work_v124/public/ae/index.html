<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AE Command</title><link rel="stylesheet" href="../assets/css/styles.css"></head>
<body>
<div class="site-shell">
  <div class="nav-wrap"><div class="nav-inner"><a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="Skyes Over London"><span>AE Command</span></a><nav class="nav-links"><a data-nav href="../index.html">Overview</a><a data-nav href="../merchant/index.html">Merchant Command</a><a data-nav href="../design/index.html">Design Studio</a><a data-nav href="../ae/index.html">AE Command</a><a data-nav href="../store/index.html">Storefront</a><a data-nav href="../customer/index.html">Customer Portal</a></nav></div></div>
  <main class="container">
    <section class="portal-grid">
      <form id="ae-login-form" class="panel">
        <div class="eyebrow">AE access</div>
        <label>AE command token<input name="token" type="password" placeholder="AE_COMMAND_TOKEN"></label>
        <div class="button-row"><button type="submit">Unlock AE command</button></div>
        <div id="ae-status" class="status-box"></div>
      </form>
      <form id="agent-form" class="panel">
        <div class="eyebrow">Add AE agent</div>
        <div class="form-grid">
          <label>Display name<input name="displayName"></label>
          <label>Email<input name="email"></label>
          <label>Territory<input name="territory"></label>
          <label style="grid-column:1/-1">Notes<textarea name="notes"></textarea></label>
        </div>
        <div class="button-row"><button type="submit">Add agent</button></div>
      </form>
    </section>
    <section class="grid-2" style="margin-top:18px">
      <form id="booking-form" class="panel">
        <div class="eyebrow">Book merchant visit</div>
        <div class="form-grid">
          <label>Agent<select name="agentId" id="booking-agent"></select></label>
          <label>Merchant<select name="merchantId" id="booking-merchant"></select></label>
          <label>Booking date<input name="bookingDate" placeholder="2026-04-20T09:00"></label>
          <label>Location<input name="location"></label>
          <label>Contact name<input name="contactName"></label>
          <label>Contact phone<input name="contactPhone"></label>
          <label style="grid-column:1/-1">Notes<textarea name="notes"></textarea></label>
        </div>
        <div class="button-row"><button type="submit">Create booking</button></div>
      </form>
      <form id="route-form" class="panel">
        <div class="eyebrow">Generate route packet</div>
        <div class="form-grid">
          <label>Agent<select name="agentId" id="route-agent"></select></label>
          <label>Route date<input name="routeDate" placeholder="2026-04-20"></label>
        </div>
        <div class="button-row"><button type="submit">Generate packet</button></div>
        <div id="route-output" class="list" style="margin-top:12px"></div>
      </form>
    </section>
    <section class="grid-3" style="margin-top:18px">
      <div class="panel"><div class="eyebrow">AE roster</div><div id="agent-list" class="list"></div></div>
      <div class="panel"><div class="eyebrow">Merchant list</div><div id="merchant-list" class="list"></div></div>
      <div class="panel"><div class="eyebrow">Bookings</div><div id="booking-list" class="list"></div></div>
    </section>
  </main>
  <footer class="footer"><div class="footer-inner"><div>AE command keeps merchant onboarding and route operations inside the same commerce platform family.</div><div><a href="../merchant/index.html">Merchant command</a></div></div></footer>
</div>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/ae.js"></script>
</body>
</html>
