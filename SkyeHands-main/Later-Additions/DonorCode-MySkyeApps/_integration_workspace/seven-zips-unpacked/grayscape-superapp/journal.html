<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0b0b0e"/>
  <title>GRAYSCAPE // JOURNAL</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="icon" href="./icons/icon-192.png"/>
  <link rel="stylesheet" href="./assets/superpage.css"/>
  <link rel="stylesheet" href="./assets/superdock.css"/>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="ui">
    <div class="wrap">
      <div class="hero">
        <h1>JOURNAL</h1>
        <p class="small">Stored as grayscape_journal_v1.</p>
      </div>
      <div class="card"><div class="row">
  <div style="flex:1;min-width:220px">
    <div class="small">DATE</div>
    <input id="date" class="inp" type="date"/>
  </div>
  <div style="flex:2;min-width:260px">
    <div class="small">TITLE</div>
    <input id="title" class="inp" placeholder="Entry title…"/>
  </div>
  <div style="min-width:220px">
    <div class="small">MOOD</div>
    <select id="mood">
      <option value="">—</option>
      <option>Calm</option><option>Focused</option><option>Driven</option>
      <option>Angry</option><option>Stressed</option><option>Grateful</option>
    </select>
  </div>
</div>
<div style="margin-top:12px">
  <div class="small">ENTRY</div>
  <textarea id="content" placeholder="Write…"></textarea>
</div>
<div class="row" style="margin-top:12px">
  <button id="save" class="btn" style="min-width:180px">SAVE</button>
  <button id="new" class="btn" style="min-width:180px">NEW</button>
  <input id="q" class="inp" placeholder="Search…" style="flex:1;min-width:260px"/>
  <button id="search" class="btn" style="min-width:160px">SEARCH</button>
</div>
<div class="list" id="list"></div></div>
    </div>
  </div>

  
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(()=>{if(!window.THREE)return;const c=document.getElementById('bg');if(!c)return;
const s=new THREE.Scene();const cam=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);cam.position.z=60;
const r=new THREE.WebGLRenderer({canvas:c,alpha:true,antialias:true});r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(2,devicePixelRatio||1));
const n=1800,g=new THREE.BufferGeometry(),p=new Float32Array(n*3);
for(let i=0;i<n;i++){const j=i*3;p[j]=(Math.random()-.5)*520;p[j+1]=(Math.random()-.5)*520;p[j+2]=(Math.random()-.5)*520;}
g.setAttribute('position',new THREE.BufferAttribute(p,3));
const pts=new THREE.Points(g,new THREE.PointsMaterial({size:1.1,transparent:true,opacity:.85}));s.add(pts);
let mx=0,my=0;addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*1.5;my=(e.clientY/innerHeight-.5)*1.5;},{passive:true});
(function t(){pts.rotation.y+=.00095+mx*.0002;pts.rotation.x+=.00065+my*.0002;r.render(s,cam);requestAnimationFrame(t);})();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);});
})();
</script>

  <script src="./assets/superdock.js"></script>
  <script>const K="grayscape_journal_v1",$=s=>document.querySelector(s),sp=(s,f)=>{try{return JSON.parse(s)}catch{return f}},uid=()=> "j_"+Math.random().toString(16).slice(2)+Date.now().toString(16);
const esc=s=>String(s||"").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])),today=()=>new Date().toISOString().slice(0,10);
let cur=null;const ld=()=>sp(localStorage.getItem(K)||"{}",{entries:[]}),sv=d=>localStorage.setItem(K,JSON.stringify(d));
function reset(){cur=null;$("#date").value=today();$("#title").value="";$("#mood").value="";$("#content").value="";}
function r(f=""){const db=ld();db.entries=Array.isArray(db.entries)?db.entries:[];const q=(f||"").trim().toLowerCase();
const items=db.entries.slice().sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));
const sh=q?items.filter(e=>((e.title||"")+" "+(e.content||"")+" "+(e.date||"")+" "+(e.mood||"")).toLowerCase().includes(q)):items;
$("#list").innerHTML=sh.length?sh.slice(0,60).map(e=>`<div class="item" data-id="${e.id}" style="cursor:pointer"><div style="width:10px;height:10px;border-radius:6px;margin-top:6px;background:rgba(255,215,0,.85)"></div><div style="flex:1"><div style="font-weight:900;letter-spacing:.06em;text-transform:uppercase;font-size:12px">${esc(e.title||"Entry")}</div><div class="small" style="margin-top:6px">${esc(e.date||"")}${e.mood?(" · "+esc(e.mood)):""}</div><div class="small" style="margin-top:6px">${esc((e.content||"").slice(0,220))}${(e.content||"").length>220?"…":""}</div></div><button class="btn" data-del="${e.id}" style="min-width:120px">DELETE</button></div>`).join(""):`<div class="small">No entries yet.</div>`;
document.querySelectorAll("[data-del]").forEach(b=>b.onclick=(ev)=>{ev.stopPropagation();const id=b.getAttribute("data-del");const db=ld();db.entries=(db.entries||[]).filter(x=>x.id!==id);sv(db);if(cur===id)reset();r($("#q").value);});
document.querySelectorAll("[data-id]").forEach(row=>row.onclick=(ev)=>{if(ev.target&&ev.target.hasAttribute("data-del"))return;const id=row.getAttribute("data-id");const db=ld();const e=(db.entries||[]).find(x=>x.id===id);if(!e)return;cur=e.id;$("#date").value=e.date||today();$("#title").value=e.title||"";$("#mood").value=e.mood||"";$("#content").value=e.content||"";});}
$("#save").onclick=()=>{const date=$("#date").value||today(),title=$("#title").value.trim()||"Untitled",mood=$("#mood").value||"",content=$("#content").value||"";const db=ld();db.entries=db.entries||[];const now=Date.now();
if(cur){const e=(db.entries||[]).find(x=>x.id===cur);if(e){e.date=date;e.title=title;e.mood=mood;e.content=content;e.updatedAt=now;}}
else{const id=uid();db.entries.unshift({id,date,title,mood,content,createdAt:now,updatedAt:now});cur=id;}
sv(db);r($("#q").value);};
$("#new").onclick=()=>reset();$("#search").onclick=()=>r($("#q").value);$("#q").onkeydown=e=>{if(e.key==="Enter")r($("#q").value);};
reset();r();</script>
</body>
</html>
