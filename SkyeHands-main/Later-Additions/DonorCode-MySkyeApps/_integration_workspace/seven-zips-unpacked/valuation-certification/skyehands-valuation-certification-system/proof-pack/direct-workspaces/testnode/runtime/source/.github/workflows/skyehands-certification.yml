name: skyehands-certification
on:
  push:
  pull_request:
jobs:
  smoke-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/skyehands-smoke.mjs
      - run: node --test
