name: Release (signed)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate SBOM
        run: npm run sbom:gen

      - name: Sign SBOM (required)
        env:
          SBOM_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.SBOM_SIGNING_PRIVATE_KEY_PEM }}
          SBOM_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.SBOM_SIGNING_PUBLIC_KEY_PEM }}
        run: node tools/ci-sbom-sign.mjs

      - name: Build release manifest
        run: npm run release:bundle

      - name: Sign release manifest
        env:
          RELEASE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY_PEM }}
          RELEASE_SIGNING_PUBLIC_KEY_PEM: ${{ secrets.RELEASE_SIGNING_PUBLIC_KEY_PEM }}
        run: |
          node tools/release-sign.mjs
          node tools/release-verify.mjs

      - name: Create source archive
        run: |
          zip -r webpile-pro-${{ github.ref_name }}.zip . -x "node_modules/*" ".netlify/*" "*.zip" "*.sig" "*.sha256"

      - name: Checksums
        run: |
          sha256sum webpile-pro-${{ github.ref_name }}.zip > webpile-pro-${{ github.ref_name }}.zip.sha256

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            webpile-pro-${{ github.ref_name }}.zip
            webpile-pro-${{ github.ref_name }}.zip.sha256
            sbom.cdx.json
            sbom.cdx.json.sha256
            sbom.cdx.json.sig
            release.manifest.json
            release.manifest.json.sha256
            release.manifest.json.sig
