[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, OPTIONS"

[[redirects]]
  from = "/api/music/analytics"
  to = "/.netlify/functions/music-analytics"
  status = 200

[[redirects]]
  from = "/api/music/artists"
  to = "/.netlify/functions/music-artists"
  status = 200

[[redirects]]
  from = "/api/music/releases"
  to = "/.netlify/functions/music-releases"
  status = 200

[[redirects]]
  from = "/api/music/payments"
  to = "/.netlify/functions/music-payments"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
