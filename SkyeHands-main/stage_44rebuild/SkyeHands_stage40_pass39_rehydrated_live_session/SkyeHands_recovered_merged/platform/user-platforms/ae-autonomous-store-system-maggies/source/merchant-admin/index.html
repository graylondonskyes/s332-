<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merchant Admin · AE Autonomous Store System</title>
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:#090b12;color:#f4f7fb}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}.panel{background:#111626;border:1px solid #283454;border-radius:18px;padding:18px;margin-bottom:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.row{display:flex;gap:10px;flex-wrap:wrap}.muted{color:#9fb0cf}
    input,textarea,select,button{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #31446f;background:#0d1322;color:#f4f7fb;box-sizing:border-box}
    button{cursor:pointer;background:#182449}.two{display:grid;grid-template-columns:2fr 1fr;gap:18px}.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#182449;border:1px solid #38519d}
    table{width:100%;border-collapse:collapse}td,th{padding:10px;border-bottom:1px solid #26314d;text-align:left;font-size:14px}a{color:#b7d4ff}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="../index.html">← Back to system launcher</a></p>
    <h1>Merchant Admin</h1>
    <div id="app"></div>
  </div>
  <script type="module" src="./app.mjs"></script>
</body>
</html>
