[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/phc-health"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/phc-auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/phc-auth-logout"
  status = 200

[[redirects]]
  from = "/api/auth/mfa/*"
  to = "/.netlify/functions/phc-auth-mfa-:splat"
  status = 200

[[redirects]]
  from = "/api/sync/*"
  to = "/.netlify/functions/phc-sync-:splat"
  status = 200

[[redirects]]
  from = "/api/payment/*"
  to = "/.netlify/functions/phc-payment-:splat"
  status = 200

[[redirects]]
  from = "/api/webhook/paypal"
  to = "/.netlify/functions/phc-webhook-paypal"
  status = 200

[[redirects]]
  from = "/api/webhook/stripe"
  to = "/.netlify/functions/phc-webhook-stripe"
  status = 200

[[redirects]]
  from = "/api/webhook/square"
  to = "/.netlify/functions/phc-webhook-square"
  status = 200

[[redirects]]
  from = "/api/valuation"
  to = "/.netlify/functions/phc-valuation"
  status = 200

[[redirects]]
  from = "/api/walkthrough"
  to = "/.netlify/functions/phc-walkthrough"
  status = 200

[[redirects]]
  from = "/api/jobs/*"
  to = "/.netlify/functions/phc-job-:splat"
  status = 200

[[redirects]]
  from = "/api/neon/*"
  to = "/.netlify/functions/phc-neon-:splat"
  status = 200

[[redirects]]
  from = "/api/rbac/*"
  to = "/.netlify/functions/phc-app-fabric-rbac-:splat"
  status = 200

[[redirects]]
  from = "/api/app-fabric/*"
  to = "/.netlify/functions/phc-app-fabric-:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/apps/audit-ready-console/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/apps/audit-ready-console/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
