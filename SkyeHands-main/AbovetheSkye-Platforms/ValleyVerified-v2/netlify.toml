[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/valley-jobs"
  status = 200

[[redirects]]
  from = "/api/contractors"
  to = "/.netlify/functions/valley-contractors"
  status = 200

[[redirects]]
  from = "/api/claims"
  to = "/.netlify/functions/valley-claims"
  status = 200

[[redirects]]
  from = "/api/fulfillment"
  to = "/.netlify/functions/valley-fulfillment"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
