[build]
  functions = "netlify/functions"
  publish = "public"

[dev]
  functions = "netlify/functions"
  port = 8888
  targetPort = 3000

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/leads/*"
  to = "/.netlify/functions/leads"
  status = 200

[[redirects]]
  from = "/api/lead-scoring"
  to = "/.netlify/functions/lead-scoring"
  status = 200

[[redirects]]
  from = "/api/lead-analytics"
  to = "/.netlify/functions/lead-analytics"
  status = 200

[functions]
  node_bundler = "esbuild"

[functions."leads"]
  included_files = []

[functions."lead-scoring"]
  included_files = []

[functions."lead-analytics"]
  included_files = []
