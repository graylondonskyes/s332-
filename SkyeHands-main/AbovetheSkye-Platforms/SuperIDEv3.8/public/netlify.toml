[build]
  publish = "."
  command = "echo 'no build'"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."skymail-standalone-gmail-watch-renew"]
  schedule = "@daily"

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/intake"
  to = "/.netlify/functions/intake"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/submissions"
  to = "/.netlify/functions/admin-submissions"
  status = 200

[[redirects]]
  from = "/api/admin/submission/*"
  to = "/.netlify/functions/admin-submission/:splat"
  status = 200

[[redirects]]
  from = "/api/admin/export"
  to = "/.netlify/functions/admin-export"
  status = 200

[[redirects]]
  from = "/api/admin/file/*"
  to = "/.netlify/functions/admin-file/:splat"
  status = 200

[[redirects]]
  from = "/api/auth-login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth-signup"
  to = "/.netlify/functions/auth-signup"
  status = 200

[[redirects]]
  from = "/api/auth-logout"
  to = "/.netlify/functions/auth-logout"
  status = 200

[[redirects]]
  from = "/api/auth-me"
  to = "/.netlify/functions/auth-me"
  status = 200

[[redirects]]
  from = "/api/auth-password-reset-request"
  to = "/.netlify/functions/auth-password-reset-request"
  status = 200

[[redirects]]
  from = "/api/auth-password-reset-confirm"
  to = "/.netlify/functions/auth-password-reset-confirm"
  status = 200

[[redirects]]
  from = "/api/auth-pin-set"
  to = "/.netlify/functions/auth-pin-set"
  status = 200

[[redirects]]
  from = "/api/auth-pin-unlock"
  to = "/.netlify/functions/auth-pin-unlock"
  status = 200

[[redirects]]
  from = "/api/token-issue"
  to = "/.netlify/functions/token-issue"
  status = 200

[[redirects]]
  from = "/api/token-list"
  to = "/.netlify/functions/token-list"
  status = 200

[[redirects]]
  from = "/api/token-revoke"
  to = "/.netlify/functions/token-revoke"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
