<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>s0l26 0s · Archive Catalog</title>
  <style>body{margin:0;background:#05060b;color:#eef2ff;font-family:Inter,system-ui,sans-serif}main{max-width:1180px;margin:0 auto;padding:32px}h1{font-size:clamp(2rem,5vw,4rem);margin:0 0 12px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}p{color:#94a3b8;line-height:1.6}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:28px}.card{display:block;padding:18px 18px 16px;border-radius:24px;background:rgba(15,23,42,.75);border:1px solid rgba(255,255,255,.08);color:inherit;text-decoration:none;box-shadow:0 18px 50px rgba(0,0,0,.35)}.k{font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:#818cf8;font-weight:800}strong{display:block;font-size:20px;margin:10px 0 6px}small{color:#64748b;word-break:break-all}</style>
  <script src="/s0l26/shared-runtime.js"></script>
</head>
<body>
  <main>
    <div class='k'>s0l26 0s · normalized archive lane</div>
    <h1>Creative Environment Catalog</h1>
    <p>This is the unified launcher for the normalized skAIxuIDEpro archive. Every shipped app now inherits the same Skyes Over London / kAIxU auth, AI routing, Neon backup lane, footer shell, and operator links.</p>
    <div class='grid' id='grid'></div>
  </main>
  <script>fetch('/s0l26/catalog.json').then(r=>r.json()).then(items=>{const grid=document.getElementById('grid');grid.innerHTML=items.map(it=>`<a class="card" href="${it.path}"><span class="k">${it.group}</span><strong>${it.title}</strong><small>${it.path}</small></a>`).join('')})</script>
  <script src='/s0l26/shared-runtime.js'></script>
</body>
</html>
