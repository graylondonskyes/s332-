<!doctype html>
<html lang='en'><head><meta charset='utf-8'><title>Skye Media Center Runtime</title><meta name='viewport' content='width=device-width, initial-scale=1'>
<style>body{margin:0;min-height:100vh;background:linear-gradient(150deg,#05070f,#141530 45%,#221652);color:#fff;font:16px/1.45 system-ui,sans-serif}.shell{max-width:1280px;margin:0 auto;padding:24px;display:grid;gap:18px}.panel{background:rgba(14,12,30,.86);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px}.hero,.grid,.form-grid,.kpis{display:grid;gap:18px}.hero{grid-template-columns:1.1fr .9fr}.grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.kpis{grid-template-columns:repeat(3,minmax(120px,1fr))}label{display:grid;gap:6px}input,textarea{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.11);background:rgba(7,7,13,.55);color:#fff}button{padding:12px 14px;border:none;border-radius:14px;background:linear-gradient(135deg,#c998ff,#f4c867);color:#120c1f;font-weight:700;cursor:pointer}.soft{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.08)}.list{display:grid;gap:10px;max-height:420px;overflow:auto}.row,.kpi{padding:14px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.05)}pre{margin:0;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.26);padding:12px;border-radius:14px}@media (max-width:980px){.hero,.grid,.form-grid,.kpis{grid-template-columns:1fr}}</style></head><body><div class='shell'>
<section class='hero'><div class='panel'><div>Branch normalization</div><h1>Skye Media Center Runtime</h1><p>Promoted runtime lane for asset registration, artist-drop collections, signed share packets, and shared media-library indexing.</p></div><div class='panel'><div class='kpis'><div class='kpi'><span>Assets</span><strong data-kpi='assets'>0</strong></div><div class='kpi'><span>Collections</span><strong data-kpi='collections'>0</strong></div><div class='kpi'><span>Artist drops</span><strong data-kpi='drops'>0</strong></div></div></div></section>
<section class='grid'><div class='panel'><h2>Artist drop builder</h2><div class='form-grid'><label>Artist slug<input id='artist' value='skyes-over-london'></label><label>Hero title<input id='title' value='Skyes Over London Hero'></label><label>Track title<input id='track' value='Launch Anthem'></label><label>Collection title<input id='collection' value='Spring Launch Drop'></label><label>Hero source<input id='heroSrc' value='/assets/artist-hero.png'></label><label>Search filter<input id='filter' placeholder='artist, tag, title'></label></div><div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:14px'><button id='buildDrop'>Build artist drop</button><button class='soft' id='registerPoster'>Register poster asset</button></div></div><div class='panel'><h2>Library + packet</h2><div class='list' id='list'></div><pre id='output'>No media packet generated yet.</pre></div></section></div>
<script src='../../../integration/cross-platform-nav.js' data-commandhub-root='../../../'></script><script src='../../../integration/commandhub-runtime-client.js'></script>
<script>(async()=>{const Runtime=window.SkyeCommandHubRuntimeClient;const $=s=>document.querySelector(s);async function token(){let t=localStorage.getItem('skye.commandhub.stage14.token')||'';if(t) return t; const issued=await Runtime.issueSession({operatorId:'founder',name:'Skyes Over London',role:'founder',email:'SkyesOverLondonLC@solenterprises.org'}); t=issued.issued.token; localStorage.setItem('skye.commandhub.stage14.token',t); return t;}function render(library){const assetCount=library&&library.assetCount||0;const collectionCount=library&&library.collectionCount||0;document.querySelector('[data-kpi="assets"]').textContent=assetCount;document.querySelector('[data-kpi="collections"]').textContent=collectionCount;document.querySelector('[data-kpi="drops"]').textContent=(library&&library.collections?library.collections.length:0); $('#list').innerHTML=assetCount?(library.assets||[]).map(item=>`<div class='row'><strong>${item.title}</strong><div>${item.artistSlug||'n/a'} · ${item.mediaType}</div><div>${(item.tags||[]).join(', ')}</div></div>`).join(''):`<div class='row'>No assets yet.</div>`;} async function refresh(q=''){const res=await Runtime.mediaLibrary(q); render(res.library); return res;} $('#buildDrop').onclick=async()=>{const t=await token(); const res=await Runtime.media(t,{action:'buildArtistDrop',artistSlug:$('#artist').value,title:$('#title').value,trackTitle:$('#track').value,collectionTitle:$('#collection').value,heroSrc:$('#heroSrc').value}); $('#output').textContent=JSON.stringify({collection:res.collection,artifact:res.artifact},null,2); render(res.library);}; $('#registerPoster').onclick=async()=>{const t=await token(); const res=await Runtime.media(t,{action:'registerAsset',asset:{artistSlug:$('#artist').value,title:'Poster Art',mediaType:'image',tags:['poster','promo'],payload:{src:$('#heroSrc').value}}}); $('#output').textContent=JSON.stringify(res.asset,null,2); render(res.library);}; $('#filter').oninput=e=>refresh(e.target.value||''); refresh();})();</script>

<script src="/integration/commandhub-devglow-core.js"></script>
<script src="/integration/commandhub-devglow.js"></script>
</body></html>
