<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Skye Lead Vault Runtime</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#090612;color:#fff;padding:20px} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px} .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;box-shadow:0 20px 50px rgba(0,0,0,.35)} h1,h2{margin:0 0 8px} input,textarea,select{width:100%;margin-top:6px;background:#130f22;color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px} textarea{min-height:90px} button{background:#7c3aed;color:#fff;border:0;border-radius:999px;padding:10px 16px;cursor:pointer;margin-right:8px;margin-top:8px} .soft{background:rgba(255,255,255,.08)} pre{white-space:pre-wrap;background:#0f0b1a;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px;min-height:160px} .kpi{font-size:26px;font-weight:800} .row{padding:10px 0;border-top:1px solid rgba(255,255,255,.08)}</style>
<script src="../../../integration/commandhub-runtime-client.js"></script>
</head><body>
<div class="card"><h1>Skye Lead Vault Runtime</h1><p>Lead save, duplicate radar, route planning, script packs, and signed backup export through the shared CommandHub runtime.</p></div>
<div class="grid" style="margin-top:14px"><div class="card"><div>Leads</div><div class="kpi" data-kpi="leads">0</div></div><div class="card"><div>Route plans</div><div class="kpi" data-kpi="routes">0</div></div><div class="card"><div>Script packs</div><div class="kpi" data-kpi="packs">0</div></div><div class="card"><div>Pipeline value</div><div class="kpi" data-kpi="value">$0</div></div></div>
<div class="grid" style="margin-top:14px">
  <div class="card"><h2>Lead</h2><label>Business<input id="business" value="Founders Command"></label><label>Primary contact<input id="contact" value="Skyes Over London"></label><label>Email<input id="email" value="SkyesOverLondonLC@solenterprises.org"></label><label>Phone<input id="phone" value="4804695416"></label><label>Territory<input id="territory" value="Phoenix"></label><label>Stage<select id="stage"><option>Prospect</option><option>Contacted</option><option selected>Warm</option><option>Proposal</option><option>Won</option></select></label><label>Estimated value<input id="value" value="8500"></label><label>Notes<textarea id="notes">Founder command lane with route planning, backup export, and playbook needs.</textarea></label><button id="save">Save lead</button><button class="soft" id="script">Build script pack</button></div>
  <div class="card"><h2>Route + backup</h2><label>Route plan title<input id="routeTitle" value="Phoenix founder route"></label><label>Estimated miles<input id="miles" value="18"></label><label>Estimated minutes<input id="minutes" value="64"></label><button id="route">Save route plan</button><button class="soft" id="backup">Export signed backup</button><button class="soft" id="restore">Merge restore last backup</button><label style="margin-top:12px">Search archive<input id="search" placeholder="search business, route, or script pack"></label><div id="list"></div></div>
</div>
<div class="card" style="margin-top:14px"><h2>Runtime output</h2><pre id="output"></pre></div>
<script>(async()=>{const Runtime=window.SkyeCommandHubRuntimeClient;const $=s=>document.querySelector(s);let lastLeadId='';let lastBackup=null;const money=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(v||0));async function token(){let t=localStorage.getItem('skye.commandhub.stage15.token')||'';if(t)return t;const issued=await Runtime.issueSession({operatorId:'founder',name:'Skyes Over London',role:'founder',email:'SkyesOverLondonLC@solenterprises.org'});t=issued.issued.token;localStorage.setItem('skye.commandhub.stage15.token',t);return t;}function lead(){return{business:$('#business').value,primaryContact:$('#contact').value,email:$('#email').value,phone:$('#phone').value,territory:$('#territory').value,stage:$('#stage').value,estimatedValue:$('#value').value,notes:$('#notes').value,nextFollowup:new Date(Date.now()+86400000).toISOString()};}function render(a){const s=(a&&a.summary)||{};document.querySelector('[data-kpi="leads"]').textContent=s.leads||0;document.querySelector('[data-kpi="routes"]').textContent=s.routePlans||0;document.querySelector('[data-kpi="packs"]').textContent=s.scriptPacks||0;document.querySelector('[data-kpi="value"]').textContent=money(s.pipelineValue||0);$('#list').innerHTML=(a&&a.leads||[]).slice(0,4).map(item=>`<div class='row'><strong>${item.business}</strong><div>${item.stage} · ${item.territory||'no territory'}</div></div>`).join('')||'<div class="row">No leads yet.</div>';}async function refresh(q=''){const res=await Runtime.leadVaultArchive(q);render(res.archive);return res.archive;}$('#save').onclick=async()=>{const t=await token();const res=await Runtime.leadVault(t,{action:'saveLead',lead:lead()});lastLeadId=res.lead.id;$('#output').textContent=JSON.stringify(res,null,2);render(res.archive);};$('#script').onclick=async()=>{const t=await token();if(!lastLeadId){const saved=await Runtime.leadVault(t,{action:'saveLead',lead:lead()});lastLeadId=saved.lead.id;}const res=await Runtime.leadVault(t,{action:'buildScriptPack',leadId:lastLeadId,senderName:'Skyes Over London',companyName:'Skyes Over London LC'});$('#output').textContent=res.pack.markdown;render(res.archive);};$('#route').onclick=async()=>{const t=await token();if(!lastLeadId){const saved=await Runtime.leadVault(t,{action:'saveLead',lead:lead()});lastLeadId=saved.lead.id;}const res=await Runtime.leadVault(t,{action:'saveRoutePlan',routePlan:{title:$('#routeTitle').value,territory:$('#territory').value,leadIds:[lastLeadId],estimatedMiles:$('#miles').value,estimatedMinutes:$('#minutes').value}});$('#output').textContent=JSON.stringify(res.routePlan,null,2);render(res.archive);};$('#backup').onclick=async()=>{const t=await token();const res=await Runtime.leadVault(t,{action:'exportBackup',title:'Founder Lead Vault Backup'});lastBackup=res.backup.bundle;$('#output').textContent=JSON.stringify({signature:res.backup.signature,summary:res.backup.bundle.summary},null,2);render(res.archive);};$('#restore').onclick=async()=>{const t=await token();if(!lastBackup){const exported=await Runtime.leadVault(t,{action:'exportBackup',title:'Founder Lead Vault Backup'});lastBackup=exported.backup.bundle;}const res=await Runtime.leadVault(t,{action:'mergeRestore',bundle:lastBackup});$('#output').textContent=JSON.stringify(res.restore,null,2);render(res.archive);};$('#search').oninput=e=>refresh(e.target.value||'');refresh();})();</script>

<script src="/integration/commandhub-devglow-core.js"></script>
<script src="/integration/commandhub-devglow.js"></script>
</body></html>
