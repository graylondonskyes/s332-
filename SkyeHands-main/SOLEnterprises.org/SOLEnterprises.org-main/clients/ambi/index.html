const input = document.getElementById("SOLE_KEY_INPUT");
const btn   = document.getElementById("SOLE_UNLOCK");
const err   = document.getElementById("SOLE_ERR");
const dbg   = document.getElementById("SOLE_DEBUG");
const gate  = document.getElementById("SOLE_GATE");
const tpl   = document.getElementById("SOLE_APP_SRC");
const frame = document.getElementById("SOLE_IFRAME");

function setDebug(t){ dbg.textContent = t; }
function showErr(msg){ err.textContent = msg; err.style.display = "block"; }
function clearErr(){ err.style.display = "none"; }

async function sha256Normalized(text){
  const normalized = text.trim().toUpperCase();
  const data = new TextEncoder().encode(normalized);
  const hash = await crypto.subtle.digest("SHA-256", data);
  const hex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
  return { normalized, hex };
}

let db = null;
try{
  if (!window.firebase) throw new Error("Firebase SDK not loaded (firebase is undefined).");
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  setDebug("Firestore: READY\nProject: " + firebase.app().options.projectId + "\nLookup: notes field + fallback GETs");
}catch(e){
  setDebug("Gate boot error:\n" + (e && e.message ? e.message : String(e)));
}

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){ e.preventDefault(); btn.click(); }
});

function unlock(found){
  frame.srcdoc = tpl.innerHTML;
  gate.remove();
  console.log("SOLE unlock via:", found);
}

/* Primary collection (per your screenshot) */
const COLLECTION = "sole_keys";

if (btn) {
  btn.addEventListener("click", async ()=>{
    clearErr();
    if(!db){ showErr("Gate error:\nFirestore not initialized.\nSee debug."); return; }

    const raw = input?.value || "";
    if(!raw) return;

    btn.disabled = true;
    btn.textContent = "Checking…";

  try{
    const rawTrim = raw.trim();
    const { normalized, hex } = await sha256Normalized(rawTrim);

    setDebug(
      "Firestore: READY\n" +
      "Project: " + firebase.app().options.projectId + "\n" +
      "Normalized: " + normalized + "\n" +
      "Hash(hex): " + hex + "\n\n" +
      "Attempt order:\n" +
      "1) GET sole_keys/{hash}\n" +
      "2) GET sole_keys/{normalizedKey}\n" +
      "3) GET sole_keys/{rawTrim}\n" +
      "4) QUERY sole_keys where notes == normalizedKey\n"
    );

    // 1) If you ever switch keygen to docId = hash (fast path)
    let doc = await db.collection(COLLECTION).doc(hex).get();
    if (doc.exists){
      const data = doc.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }
      unlock("GET docId == hash");
      return;
    }

    // 2) If keygen used docId = key
    doc = await db.collection(COLLECTION).doc(normalized).get();
    if (doc.exists){
      const data = doc.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }
      unlock("GET docId == normalizedKey");
      return;
    }

    doc = await db.collection(COLLECTION).doc(rawTrim).get();
    if (doc.exists){
      const data = doc.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }
      unlock("GET docId == rawTrim");
      return;
    }

    // 4) Your CURRENT keygen format (per screenshot): key stored in field "notes"
    // This requires LIST/QUERY permission on sole_keys.
    let snap;
    try{
      snap = await db.collection(COLLECTION).where("notes","==",normalized).limit(1).get();
    }catch(e){
      // If rules block list/query, you'll see this. Then your rules must allow list on /sole_keys.
      showErr("Gate error:\n" + (e && e.message ? e.message : String(e)));
      setDebug(dbg.textContent + "\n\nQUERY FAILED (notes==normalized)\nError: " + (e && e.message ? e.message : String(e)));
      return;
    }

    if (!snap.empty){
      const hit = snap.docs[0];
      const data = hit.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }
      unlock("QUERY notes == normalizedKey (docId: " + hit.id + ")");
      return;
    }

    showErr("Invalid key (not found).\nYour Firestore shows keys are stored in 'notes'.\nEnter the exact value shown in notes.");
  }catch(e){
    showErr("Gate error:\n" + (e && e.message ? e.message : String(e)));
  }finally{
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
});
}

<script id="SOLE_NAV_INTRO_SCRIPT">
(() => {
  const menu = document.getElementById('SOLE_MINI_MENU');
  const btn = menu?.querySelector('.sole-menu-btn');
  const panel = menu?.querySelector('.sole-menu-panel');

  // --- Menu toggle ---
  function setOpen(next){
    if(!menu || !btn) return;
    menu.dataset.open = next ? "1" : "0";
    btn.setAttribute('aria-expanded', next ? "true" : "false");
  }
  setOpen(false);

  btn?.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = menu.dataset.open === "1";
    setOpen(!isOpen);
  });

  document.addEventListener('click', () => setOpen(false), {passive:true});
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') setOpen(false);
  });

  panel?.addEventListener('click', (e) => e.stopPropagation());

  // --- One-time Intro Overlay (per session) ---
  const overlay = document.getElementById('SOLE_INTRO_OVERLAY');
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function hideOverlay(){
    if(!overlay) return;
    overlay.classList.add('is-hiding');
    const delay = reduce ? 10 : 650;
    window.setTimeout(() => {
      overlay.classList.remove('is-on','is-hiding');
      overlay.setAttribute('aria-hidden','true');
      try { sessionStorage.setItem('SOLE_INTRO_SEEN','1'); } catch(_) {}
    }, delay);
  }

  function showOverlayOnce(){
    if(!overlay) return;
    let seen = false;
    try { seen = sessionStorage.getItem('SOLE_INTRO_SEEN') === '1'; } catch(_) {}
    if(seen) return;

    overlay.classList.add('is-on');
    overlay.setAttribute('aria-hidden','false');

    // Keep the welcome on-screen for a full 5 seconds (minimum), then fade out.
    const minMs = 5000;
    const shownAt = Date.now();
    const t = window.setTimeout(hideOverlay, minMs);

    const requestHide = () => {
      const elapsed = Date.now() - shownAt;
      const remaining = minMs - elapsed;
      window.clearTimeout(t);
      if(remaining > 0) {
        window.setTimeout(hideOverlay, remaining);
      } else {
        requestHide();
      }
    };

    const early = () => {
      requestHide();
      window.removeEventListener('pointerdown', early);
      window.removeEventListener('keydown', early);
    };
    window.addEventListener('pointerdown', early, {once:true});
    window.addEventListener('keydown', early, {once:true});
  }

  // Wait for first paint so overlay feels intentional
  window.requestAnimationFrame(() => window.requestAnimationFrame(showOverlayOnce));
})();
</script>
