<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Portfolio | SOLEnterprises</title>
  <meta name="description" content="SOLEnterprises client portfolio - premium websites hosted and maintained by SOLE." />
  <link rel="stylesheet" href="/assets/css/style.css" />
  
  <style>
    .clients-hero {
      text-align: center;
      padding: 20px 20px 20px;
    }
    
    .clients-hero h1 {
      font-size: clamp(24px, 5vw, 48px);
      margin: 0 0 10px;
      background: linear-gradient(90deg, #ffcc55, #ff3df0, #2ef6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 900;
    }
    
    .clients-hero p {
      font-size: clamp(14px, 2vw, 18px);
      color: rgba(255,255,255,0.85);
      max-width: 600px;
      margin: 0 auto;
    }
    
    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 6% 40px;
    }
    
    .client-card {
      background: rgba(0,0,0,0.40);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 20px 18px;
      backdrop-filter: blur(10px);
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .client-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: radial-gradient(
        circle at 50% 50%,
        rgba(255,61,240,0.15),
        transparent 70%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .client-card:hover {
      transform: translateY(-8px);
      border-color: rgba(46,246,255,0.45);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    .client-card:hover::before {
      opacity: 1;
    }
    
    .client-logo {
      width: 100%;
      height: 120px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      margin-bottom: 15px;
      display: grid;
      place-items: center;
      font-size: 36px;
      position: relative;
      z-index: 1;
    }
    
    .client-name {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 8px;
      color: #fff;
      position: relative;
      z-index: 1;
    }
    
    .client-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      margin: 0 0 12px;
      position: relative;
      z-index: 1;
    }
    
    .client-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    
    .client-tag {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(214,178,74,0.15);
      border: 1px solid rgba(214,178,74,0.35);
      font-size: 12px;
      font-weight: 700;
      color: #d6b24a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .add-client {
      background: linear-gradient(135deg, rgba(214,178,74,0.2), rgba(214,178,74,0.05));
      border: 2px dashed rgba(214,178,74,0.5);
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
      min-height: 320px;
    }
    
    .add-client:hover {
      background: linear-gradient(135deg, rgba(214,178,74,0.3), rgba(214,178,74,0.1));
      border-color: rgba(214,178,74,0.8);
      transform: translateY(-8px);
    }
    
    .add-client .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.7;
    }
    
    .add-client .text {
      font-size: 18px;
      font-weight: 700;
      color: #d6b24a;
    }
    
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.6);
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
    }
    
    .empty-state h2 {
      font-size: 24px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
    }
    
    /* Client count badge */
    .client-count {
      display: inline-block;
      background: rgba(214,178,74,0.2);
      border: 1px solid rgba(214,178,74,0.4);
      color: #d6b24a;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      margin-top: 15px;
    }
    
    @media (max-width: 768px) {
      .site-nav {
        padding: 10px 3% !important;
      }
      .site-nav a {
        font-size: 12px !important;
        padding: 8px 10px !important;
      }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="page">
    <div class="clients-hero">
      <h1>🌐 Client Portfolio</h1>
      <p>Premium websites hosted and maintained by SOLEnterprises</p>
      <div class="client-count" id="client-count">Loading...</div>
    </div>

    <div class="clients-grid" id="clients-grid">
      <div class="loading-state">
        ⏳ Loading client portfolio...
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/clients/clients-data.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script type="module" src="/assets/js/app.js"></script>
  
  <script>
    // Auto-populate client grid from centralized data
    (function(){
      function renderClientGrid(){
        const grid = document.getElementById('clients-grid');
        const countBadge = document.getElementById('client-count');
        
        if(!grid) return;
        
        // Check if data loaded
        if(typeof SOLE_CLIENTS === 'undefined' || !Array.isArray(SOLE_CLIENTS)){
          grid.innerHTML = '<div class="empty-state"><h2>⚠️ Could not load clients</h2><p>Check that /clients/clients-data.js exists</p></div>';
          if(countBadge) countBadge.textContent = '0 Clients';
          return;
        }
        
        // Update count badge
        if(countBadge) {
          countBadge.textContent = SOLE_CLIENTS.length + ' Client' + (SOLE_CLIENTS.length !== 1 ? 's' : '');
        }
        
        let html = '';
        
        // Render all clients
        SOLE_CLIENTS.forEach(client => {
          html += '<a class="client-card" href="' + client.path + '">' +
            '<div class="client-logo">' + client.emoji + '</div>' +
            '<h3 class="client-name">' + client.name + '</h3>' +
            '<p class="client-desc">' + client.description + '</p>' +
            '<div class="client-meta">' +
              '<span class="client-tag">' + client.industry + '</span>' +
              '<span class="client-tag">' + client.status + '</span>' +
            '</div>' +
          '</a>';
        });
        
        // Add "Add Client" placeholder with instructions
        html += '<div class="client-card add-client" onclick="alert(\'To add a new client:\\n\\n1. Create folder: /clients/client-name/\\n2. Add their index.html\\n3. Edit /clients/clients-data.js\\n\\nBoth menu and portfolio auto-update!\')">' +
          '<div>' +
            '<div class="icon">➕</div>' +
            '<div class="text">Add New Client</div>' +
            '<p style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:10px;max-width:200px;">Edit /clients/clients-data.js to add clients</p>' +
          '</div>' +
        '</div>';
        
        grid.innerHTML = html;
      }
      
      // Run when DOM is ready with small delay to ensure script loaded
      if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', function(){
          setTimeout(renderClientGrid, 100);
        });
      } else {
        setTimeout(renderClientGrid, 100);
      }
    })();
  </script>
</body>
</html>
