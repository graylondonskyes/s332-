<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kaixu — Wrapper</title>
  <meta name="description" content="Kaixu app (wrapper)" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    :root{ --header-h:76px }
    html,body{height:100%;margin:0;background:#000;color:#fff}
    #site-header{}
    .embed-wrap{ position:fixed; left:0; right:0; top:var(--header-h); bottom:0; background:#000; display:flex; }
    .embed-iframe{ flex:1; border:0; width:100%; height:100%; }
    .back-to-sole{ position:fixed; left:16px; top:16px; z-index:2147483655; display:inline-flex; align-items:center; gap:8px; padding:10px 14px; background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); color: #ffd27a; border:1px solid rgba(255,210,122,.18); border-radius:999px; font-weight:700; text-decoration:none; box-shadow: 0 10px 30px rgba(0,0,0,.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .open-new{ position:fixed; right:16px; top:16px; z-index:2147483655; padding:10px 14px; border-radius:10px; background:#0b0621; color:#ffd27a; border:1px solid rgba(255,210,122,.12); text-decoration:none }
    @media (max-width:520px){ .back-to-sole{ left:10px; top:10px; padding:8px 10px } .open-new{ right:10px; top:10px; padding:8px } }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <a href="/Pages/Services.html" class="back-to-sole" aria-label="Back to SOLE Services">Back to SOLE</a>
  <a class="open-new" href="https://kaixu.base44.app/" target="_blank" rel="noopener">Open Kaixu in new tab</a>

  <div class="embed-wrap">
    <iframe class="embed-iframe" src="https://kaixu.base44.app/" title="Kaixu App" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
  </div>

  <div id="site-footer"></div>
  <script src="/assets/js/layout.js"></script>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
