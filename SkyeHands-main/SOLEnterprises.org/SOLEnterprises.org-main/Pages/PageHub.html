    :root {

      --panel: #0f172a;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #a855f7;
      --accent-3: #22d3ee;
      --card: #0c1625;
      --card-border: #1f2937;
      --text: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background: radial-gradient(circle at 30% 20%, rgba(56, 189, 248, 0.22), transparent 35%),
                  radial-gradient(circle at 75% 0%, rgba(168, 85, 247, 0.25), transparent 30%),
                  radial-gradient(circle at 50% 70%, rgba(34, 211, 238, 0.2), transparent 32%);
      filter: blur(30px);
      z-index: 0;
      animation: aurora 18s ease-in-out infinite alternate;
    }

    header {
      padding: 52px 32px 28px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 38px;
      letter-spacing: 0.8px;
      position: relative;
      display: inline-flex;
      gap: 10px;
      align-items: center;
      background: linear-gradient(120deg, #fff, var(--accent), var(--accent-2), #fff);
      background-size: 220% 220%;
      -webkit-background-clip: text;
      color: transparent;
      animation: titleGlow 12s ease-in-out infinite alternate;
      text-shadow: 0 4px 32px rgba(56, 189, 248, 0.4), 0 0 12px rgba(168, 85, 247, 0.35);
    }

    h1::after {
      content: "";
      position: absolute;
      inset: -14px -18px;
      border-radius: 28px;
      background: radial-gradient(circle at 30% 20%, rgba(56, 189, 248, 0.2), transparent 30%),
                  radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.18), transparent 32%);
      filter: blur(22px);
      opacity: 0.8;
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--accent-3);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(34, 211, 238, 0.12);
      animation: pulse 3.5s ease-in-out infinite;
    }

    p.lead {
      margin: 0 auto;
      max-width: 780px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
      position: relative;
      z-index: 1;
    }

    .meta {
      display: inline-flex;
      gap: 12px;
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      color: var(--muted);
      font-size: 13px;
      backdrop-filter: blur(6px);
    }

    main {
      padding: 10px 32px 60px;
      max-width: 1300px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 18px 18px 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, filter 160ms ease, opacity 160ms ease;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(168, 85, 247, 0.08));
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -60%;
      background:
        radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.14), transparent 40%),
        radial-gradient(circle at 40% 60%, rgba(168, 85, 247, 0.18), transparent 38%);
      transform: rotate(12deg);
      opacity: 0;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(56, 189, 248, 0.55);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.36), 0 0 28px rgba(56, 189, 248, 0.14);
      filter: saturate(1.08);
      opacity: 1;
    }

    .card:hover::before { opacity: 1; }
    .card:hover::after { opacity: 0.55; transform: rotate(0deg); }

    .card .glowbar {
      position: absolute;
      top: -2px;
      left: 16px;
      right: 16px;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.8), rgba(168, 85, 247, 0.8), transparent);
      filter: blur(2px);
      opacity: 0.85;
      animation: shimmer 2.8s linear infinite;
      z-index: 1;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .card h3 {
      margin: 0 0 6px;
      font-size: 17px;
      color: #f8fafc;
      letter-spacing: 0.3px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--accent);
      border: 1px solid rgba(56, 189, 248, 0.3);
      white-space: nowrap;
    }

    .desc {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      min-height: 40px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(168, 85, 247, 0.2));
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 10px;
      color: #e0f2fe;
      font-weight: 600;
      text-decoration: none;
      font-size: 13px;
      transition: border-color 120ms ease, transform 120ms ease, color 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 10px 25px rgba(56, 189, 248, 0.15);
      position: relative;
      overflow: hidden;
    }

    .cta:hover {
      border-color: rgba(168, 85, 247, 0.7);
      color: #f8fafc;
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(168, 85, 247, 0.22);
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: translateX(-120%);
      transition: transform 300ms ease;
    }

    .cta:hover::after {
      transform: translateX(120%);
    }

    .cta svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .fx {
      position: fixed;
      inset: -10%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .fx.fx-gradient {
      background: radial-gradient(circle at 15% 20%, rgba(56, 189, 248, 0.35), transparent 30%),
                  radial-gradient(circle at 85% 12%, rgba(168, 85, 247, 0.4), transparent 28%),
                  radial-gradient(circle at 30% 80%, rgba(37, 99, 235, 0.32), transparent 35%);
      filter: blur(40px) saturate(1.2);
      animation: breathe 16s ease-in-out infinite alternate;
      opacity: 0.75;
    }

    .fx.fx-grid {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 120px 120px, 120px 120px;
      mix-blend-mode: screen;
      opacity: 0.12;
      animation: gridScroll 28s linear infinite;
    }

    .fx.fx-particles {
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.16) 1px, transparent 2px),
        radial-gradient(circle at 60% 70%, rgba(255, 255, 255, 0.12) 1.5px, transparent 2.5px),
        radial-gradient(circle at 80% 40%, rgba(255, 255, 255, 0.18) 1px, transparent 2px);
      background-size: 600px 600px, 500px 500px, 700px 700px;
      animation: drift 22s ease-in-out infinite alternate;
      opacity: 0.28;
    }

    @keyframes breathe {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(-2%, 1%, 0) scale(1.03); }
      100% { transform: translate3d(2%, -2%, 0) scale(1.05); }
    }

    @keyframes gridScroll {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 120px 120px, 120px 120px; }
    }

    @keyframes drift {
      0% { background-position: 0 0, 30% 30%, 60% 60%; }
      50% { background-position: 10% -6%, 40% 24%, 52% 50%; }
      100% { background-position: -8% 12%, 28% 40%, 70% 34%; }

      opacity: 0.16;
      animation: scan 14s linear infinite;

    .fx-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
      opacity: 0.35;

    @keyframes breathe {

      100% { background-position: -8% 12%, 28% 40%, 70% 34%; }

    @keyframes scan {
      0% { background-position: 0 -200px; }
      100% { background-position: 0 200px; }
    }

    @media (max-width: 640px) {
      header { padding: 32px 18px 18px; }
      main { padding: 0 18px 32px; }
      h1 { font-size: 28px; }

  </style>
</head>

    async function loadPagesIndex() {
      try {
        const res = await fetch(basePrefix + 'assets/data/pages.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('pages.json fetch failed: ' + res.status);
        const data = await res.json();
        if (Array.isArray(data) && data.length) {
          pages = data;
        } else {
          console.warn('pages.json empty or invalid — using embedded fallback');
          pages = embeddedPages.slice();
        }
      } catch (err) {
        console.warn('Could not load assets/data/pages.json — using embedded fallback', err);
        pages = embeddedPages.slice();
        const meta = document.getElementById('metaSummary');
        if (meta) meta.textContent = `${pages.length} pages loaded from embedded fallback (offline)`;
      }
    }

    const stripExt = (value) => value.replace(/\.(html|htm)$/i, "");

    const normalizeSegment = (value) => {
      const cleaned = stripExt(value).replace(/[_-]+/g, " ");
      const titled = cleaned.replace(/\b\w/g, (c) => c.toUpperCase());
      return titled || value;
    };

    const prettifyTitle = (path, category) => {
      const parts = path.split("/").filter(Boolean);
      if (!parts.length) return path;

      const file = parts.pop() || "";
      const fileStem = stripExt(file);
      let folders = parts;

      if (folders.length && category && folders[0].toLowerCase() === String(category).toLowerCase()) {
        folders = folders.slice(1);
      }

      const folderLabel = folders.map(normalizeSegment).filter(Boolean).join(" / ");
      const isIndex = fileStem.toLowerCase() === "index";
      const pageLabel = normalizeSegment(isIndex && folders.length ? "Home" : (fileStem || file));

      if (folderLabel) return `${folderLabel} / ${pageLabel}`;
      return pageLabel || path;
    };

    const describe = (title, path) => {
      if (/template/i.test(path)) return "Template or starter layout used for new pages.";
      if (/backup/i.test(path)) return "Backup snapshot of a previous version.";
      if (/store/i.test(path)) return "Storefront or catalog experience.";
      if (/login|profile/i.test(path)) return "Account or authentication flow.";
      if (/hub/i.test(path)) return "Hub page linking related resources.";
      if (/export/i.test(path)) return "Exported build snapshot.";
      if (/gate/i.test(path)) return "Standalone gate or landing flow.";
      if (/client/i.test(path)) return "Client-specific view.";
      return `Quick link to the ${title} page.`;
    };

    const buildCards = () => {
      const grid = document.getElementById("pageGrid");
      const template = document.getElementById("cardTemplate");
      const fragment = document.createDocumentFragment();

      pages.forEach((page) => {
        const view = template.content.cloneNode(true);
        const title = prettifyTitle(page.path, page.category);
        const desc = describe(title, page.path);
        const article = view.querySelector(".card");
        const link = view.querySelector(".cta");
        // Ensure resolvedPath always starts with a single slash and no duplicate slashes
        let resolvedPath = `${basePrefix}${page.path}`.replace(/\/+/g, "/");
        if (!resolvedPath.startsWith("/")) resolvedPath = "/" + resolvedPath;

        view.querySelector("h3").textContent = title;
        view.querySelector(".badge").textContent = page.category || "Page";
        view.querySelector(".desc").textContent = desc;
        const encodedPath = resolvedPath
          .split("/")
          .map((segment, idx) => (idx === 0 ? segment : encodeURIComponent(segment)))
          .join("/");
        link.href = encodedPath;
        link.setAttribute("aria-label", `Open ${title}`);

        fragment.appendChild(view);
      });

      grid.innerHTML = "";
      grid.appendChild(fragment);

      const meta = document.getElementById("metaSummary");
      meta.textContent = `${pages.length} pages linked • auto-generated from the repository`;
    };

    const initParticles = () => {
      const canvas = document.getElementById("particleLayer");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const particles = [];
      const colors = ["#38bdf8", "#a855f7", "#22d3ee", "#f8fafc"];
      const maxParticles = 70;

      const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };

      const random = (min, max) => Math.random() * (max - min) + min;

      const spawn = () => ({
        x: random(0, canvas.width),
        y: random(0, canvas.height),
        size: random(1, 3),
        alpha: random(0.3, 0.9),
        speedX: random(-0.25, 0.25),
        speedY: random(-0.15, 0.35),
        color: colors[Math.floor(Math.random() * colors.length)],
        pulse: random(0.6, 1.4)
      });

      const init = () => {
        particles.length = 0;
        for (let i = 0; i < maxParticles; i++) particles.push(spawn());
      };

      const tick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, idx) => {
          p.x += p.speedX;
          p.y += p.speedY;
          p.alpha += Math.sin(Date.now() * 0.001 * p.pulse) * 0.004;

          if (p.x < -20 || p.x > canvas.width + 20 || p.y < -20 || p.y > canvas.height + 20) {
            particles[idx] = spawn();
            return;
          }

          ctx.beginPath();
          const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 6);
          gradient.addColorStop(0, `${p.color}${Math.floor(Math.max(0, Math.min(1, p.alpha)) * 255).toString(16).padStart(2, "0")}`);
          gradient.addColorStop(1, "transparent");
          ctx.fillStyle = gradient;
          ctx.arc(p.x, p.y, p.size * 6, 0, Math.PI * 2);
          ctx.fill();
        });
        requestAnimationFrame(tick);
      };

      resize();
      init();
      tick();
      window.addEventListener("resize", resize);
    };

    document.addEventListener("DOMContentLoaded", async () => {
      await loadPagesIndex();
      buildCards();
      initParticles();
    });

    // Expose a simple rerun function bound to the Refresh button so authors can re-run the index loader
    const refreshBtn = document.getElementById('refreshPagesBtn');
    if (refreshBtn) {
      refreshBtn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        const meta = document.getElementById('metaSummary');
        if (meta) meta.textContent = 'Refreshing page index…';
        try {
          await loadPagesIndex();
          buildCards();
          if (meta) meta.textContent = `${pages.length} pages loaded`;
          console.info('[PageHub] Reloaded page index:', pages.length);
        } catch (err) {
          console.error('[PageHub] Refresh failed', err);
          if (meta) meta.textContent = 'Refresh failed — see console';
        }
      });
    }
  </script>
</body>
</html>
