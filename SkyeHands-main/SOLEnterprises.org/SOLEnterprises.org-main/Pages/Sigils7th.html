    (function(){
      const gate = document.getElementById('gate');
      const unlockBtn = document.getElementById('unlock');
      const inviteInput = document.getElementById('invite');
      const invMsg = document.getElementById('invMsg');
      const enterApp = document.getElementById('enterApp');
      const readOnly = document.getElementById('readOnly');

      // Replace/extend these codes as needed:
      const VALID_CODES = new Set([
        "SIGILS-FOUNDERS",
        "SIGILS7TH",
        "SEAT-APPROVED",
        "SKYES-EXEC"
      ]);

      const KEY = "sigils7th_access";

      function grant(mode){
        sessionStorage.setItem(KEY, mode);
        gate.classList.add('hidden');
        document.body.style.overflowY = "auto";
        requestAnimationFrame(()=> window.scrollTo({top: 0, behavior: "smooth"}));
      }
      function deny(){
        invMsg.textContent = "Invalid code. Invite-only entry. Codes are case-sensitive.";
        invMsg.className = "msg bad";
      }
      function ok(){
        invMsg.textContent = "Access granted. Dossier unlocked.";
        invMsg.className = "msg ok";
      }

      const prior = sessionStorage.getItem(KEY);
      if(prior){
        gate.classList.add('hidden');
        document.body.style.overflowY = "auto";
      }else{
        document.body.style.overflowY = "hidden";
      }

      unlockBtn.addEventListener('click', ()=>{
        const code = (inviteInput.value || "").trim();
        if(!code){ deny(); return; }
        if(VALID_CODES.has(code)){
          ok();
          setTimeout(()=>grant("invite"), 420);
        }else{
          deny();
        }
      });

      inviteInput.addEventListener('keydown', (e)=>{
        if(e.key === "Enter"){ e.preventDefault(); unlockBtn.click(); }
      });

      enterApp.addEventListener('click', ()=>{
        grant("apply");
        setTimeout(()=>{
          const el = document.getElementById('apply');
          if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
        }, 80);
      });

      readOnly.addEventListener('click', ()=>{
        grant("preview");
      });

      // Cursor sigil trace
      const trace = document.getElementById('trace');
      let last = 0;
      window.addEventListener('pointermove', (e)=>{
        const now = performance.now();
        if(now - last < 22) return;
        last = now;
        const dot = document.createElement('i');
        dot.style.left = e.clientX + "px";
        dot.style.top = e.clientY + "px";
        trace.appendChild(dot);
        setTimeout(()=>dot.remove(), 980);
      }, {passive:true});

      // Starfield canvas (public-domain safe: generated)
      const c = document.getElementById('stars');
      const ctx = c.getContext('2d', {alpha:true});
      let w=0,h=0,stars=[];
      function resize(){
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        w = c.clientWidth; h = c.clientHeight;
        c.width = Math.floor(w*dpr);
        c.height = Math.floor(h*dpr);
        ctx.setTransform(dpr,0,0,dpr,0,0);
        stars = [];
        const count = Math.floor((w*h)/9000);
        for(let i=0;i<count;i++){
          stars.push({
            x: Math.random()*w,
            y: Math.random()*h,
            r: Math.random()*1.4 + 0.2,
            a: Math.random()*0.55 + 0.20,
            s: Math.random()*0.35 + 0.05
          });
        }
      }
      function draw(t){
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "rgba(0,0,0,0)";
        ctx.fillRect(0,0,w,h);

        const glow = ctx.createRadialGradient(w*0.35,h*0.28, 10, w*0.35,h*0.28, Math.max(w,h)*0.62);
        glow.addColorStop(0, "rgba(178,76,255,0.16)");
        glow.addColorStop(0.55, "rgba(255,43,214,0.06)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0,0,w,h);

        for(const st of stars){
          const tw = 0.12 + 0.88*Math.abs(Math.sin((t/1000)*st.s + st.x*0.02));
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${st.a*tw})`;
          ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
          ctx.fill();
          if(Math.random()<0.003){
            ctx.beginPath();
            ctx.fillStyle = "rgba(255,215,106,0.28)";
            ctx.arc(st.x+1.2, st.y-1.2, st.r*1.1, 0, Math.PI*2);
            ctx.fill();
          }
        }
        requestAnimationFrame(draw);
      }
      const hero = document.querySelector('.hero');
      const ro = new ResizeObserver(()=>resize());
      ro.observe(hero);
      resize();
      requestAnimationFrame(draw);

      // Smooth anchors
      document.addEventListener('click', (e)=>{
        const a = e.target.closest('a[href^="#"]');
        if(!a) return;
        const id = a.getAttribute('href');
        if(id.length<2) return;
        const el = document.querySelector(id);
        if(el){
          e.preventDefault();
          el.scrollIntoView({behavior:"smooth", block:"start"});
        }
      });

      // Application helpers
      const form = document.getElementById('appForm');
      const receipt = document.getElementById('receipt');
      const receiptText = document.getElementById('receiptText');
      const copyBtn = document.getElementById('copyApp');
      const dlBtn = document.getElementById('dlApp');

      function packet(){
        const fd = new FormData(form);
        const obj = {};
        fd.forEach((v,k)=>obj[k]=String(v).trim());
        obj.timestamp = new Date().toISOString();
        obj.program = "SIGILS 7TH™ Seat Program";
        obj.provider = "Skyes Over London LC";
        obj.term = "36 months";
        obj.seat_schedule = {
          "months_1_4":"$136/month",
          "months_5_10":"$344/month",
          "months_11_24":"$646/month",
          "months_25_36":"$1,111/month",
          "optional_exec_management":"$66/month (not mandatory)"
        };
        return obj;
      }

      copyBtn.addEventListener('click', async ()=>{
        const obj = packet();
        const text = JSON.stringify(obj, null, 2);
        try{
          await navigator.clipboard.writeText(text);
          receipt.style.display = "block";
          receiptText.innerHTML = "<b>Copied.</b> Application packet is in your clipboard.";
        }catch{
          receipt.style.display = "block";
          receiptText.textContent = "Copy failed. Use Download Application File.";
        }
      });

      dlBtn.addEventListener('click', ()=>{
        const obj = packet();
        const text = JSON.stringify(obj, null, 2);
        const blob = new Blob([text], {type:"application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "SIGILS7TH_Seat_Application.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        if(!form.checkValidity()){
          form.reportValidity();
          return;
        }
        const obj = packet();
        receipt.style.display = "block";
        receiptText.innerHTML = `
          <div style="margin-top:8px; line-height:1.6;">
            <b>Receipt Generated.</b><br/>
            Legal Name: <b>${escapeHtml(obj.legal_name || "")}</b><br/>
            Email: <b>${escapeHtml(obj.email || "")}</b><br/>
            State: <b>${escapeHtml(obj.state || "")}</b><br/>
            Preferred Names: <b>${escapeHtml(obj.entity_names || "")}</b><br/>
            Offer: <b>${escapeHtml(obj.offer || "")}</b><br/>
            Priority Pages: <b>${escapeHtml(obj.priority_pages || "")}</b><br/>
            Optional Management: <b>${escapeHtml(obj.mgmt || "")}</b><br/>
            Timestamp: <span style="font-family:var(--mono); color: rgba(255,215,106,.86);">${escapeHtml(obj.timestamp)}</span>
          </div>
        `;
      });

      function escapeHtml(s){
        return String(s).replace(/[&<>"']/g, (m)=>({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[m]));
      }
    })();
  </script>

async function sha256Normalized(text){
  const normalized = text.trim().toUpperCase();
  const data = new TextEncoder().encode(normalized);
  const hash = await crypto.subtle.digest("SHA-256", data);
  const hex = Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
  return { normalized, hex };
}

let db = null;
async function initGate(){
  let firebaseConfig = window.SOLE_FIREBASE_CONFIG;
  if (!firebaseConfig || !firebaseConfig.apiKey) {
    const res = await fetch("/.netlify/functions/firebase-config", { cache: "no-store" });
    if (!res.ok) throw new Error("Firebase config fetch failed: " + res.status);
    firebaseConfig = await res.json();
    window.SOLE_FIREBASE_CONFIG = firebaseConfig;
  }

  if (!window.firebase) throw new Error("Firebase SDK not loaded (firebase is undefined).");
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  setDebug("Firestore: READY\nProject: " + firebase.app().options.projectId + "\nLookup: notes field + fallback GETs");
}

initGate().catch((e)=>{
  setDebug("Gate boot error:\n" + (e && e.message ? e.message : String(e)));
});

input.addEventListener("keydown", e=>{

});

  frame.srcdoc = tpl.innerHTML;
  gate.remove();
  console.log("SOLE unlock via:", found);
}

      "Project: " + firebase.app().options.projectId + "\n" +
      "Normalized: " + normalized + "\n" +

      "2) GET sole_keys/{normalizedKey}\n" +
      "3) GET sole_keys/{rawTrim}\n" +

    // 1) If you ever switch keygen to docId = hash (fast path)
    let doc = await db.collection(COLLECTION).doc(hex).get();
    if (doc.exists){
      const data = doc.data() || {};

      unlock("GET docId == normalizedKey");
      return;

    doc = await db.collection(COLLECTION).doc(rawTrim).get();
    if (doc.exists){
      const data = doc.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }

    let snap;
    try{
      snap = await db.collection(COLLECTION).where("notes","==",normalized).limit(1).get();
    }catch(e){
      // If rules block list/query, you'll see this. Then your rules must allow list on /sole_keys.
      showErr("Gate error:\n" + (e && e.message ? e.message : String(e)));
      setDebug(dbg.textContent + "\n\nQUERY FAILED (notes==normalized)\nError: " + (e && e.message ? e.message : String(e)));
      return;
    }

    if (!snap.empty){
      const hit = snap.docs[0];
      const data = hit.data() || {};
      if (data.active === false) { showErr("Key is inactive."); return; }
      unlock("QUERY notes == normalizedKey (docId: " + hit.id + ")");
      return;
    }

    showErr("Invalid key (not found).\nYour Firestore shows keys are stored in 'notes'.\nEnter the exact value shown in notes.");
  }catch(e){
    showErr("Gate error:\n" + (e && e.message ? e.message : String(e)));
  }finally{
    btn.disabled = false;
    btn.textContent = "Unlock";
  }
});
</script>
