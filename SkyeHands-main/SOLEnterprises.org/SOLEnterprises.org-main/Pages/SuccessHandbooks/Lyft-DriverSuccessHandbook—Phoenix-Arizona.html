      <section class="card" id="model">
        <h2>1) The Operating Model: One-Car Business Thinking</h2>

        <div class="rule">
          <b>Profit = (Ride earnings + tips + bonuses) − (vehicle costs + time costs + risk costs)</b>
        </div>

        <div class="grid2">
          <div class="box">
            <h3>1.1 Your three numbers every shift</h3>
            <ul>
              <li><b>Online hours:</b> app on (waiting + driving).</li>
              <li><b>Engaged hours:</b> accepted + en route + on trip (the hours most closely tied to earnings output).</li>
              <li><b>Real profit per mile:</b> your earnings divided by total miles driven while working (including unpaid repositioning).</li>
            </ul>

            <div class="callout">
              <b>Principle:</b> The fastest way to increase earnings is raising <b>engaged time percentage</b> while controlling deadhead miles.
            </div>
          </div>

          <div class="box">
            <h3>1.2 Trip selection is the job</h3>
            <p>In markets with upfront earnings visibility, the driver’s advantage is selection: the right offers, from the right positions, at the right times. The work is not merely driving; the work is <b>choosing profitable work</b>.</p>
            <ul>
              <li><b>Positioning:</b> start in dense zones to reduce unpaid waiting.</li>
              <li><b>Acceptance discipline:</b> avoid long pickup drag without adequate earnings.</li>
              <li><b>Exit discipline:</b> stop time is a business decision; protect it with filters.</li>
            </ul>
          </div>
        </div>

        <h3>1.3 The contractor mindset</h3>
        <ul>
          <li><b>Work like a system:</b> checklists, logs, repeatable routines.</li>
          <li><b>Earn like a strategist:</b> not every ride is “good revenue.”</li>
          <li><b>Protect the account:</b> safety, professionalism, policy alignment.</li>
        </ul>
      </section>

      <section class="card" id="setup">
        <h2>2) Setup & Readiness: Requirements + Deactivation Prevention</h2>

        <h3>2.1 Vehicle and eligibility fundamentals</h3>
        <div class="grid2">
          <div class="box">
            <h4>Baseline vehicle structure</h4>
            <ul>
              <li>4 doors.</li>
              <li>5–8 seats/seatbelts (including driver).</li>
            </ul>
            <p>Maintain consistent compliance documentation and keep all information updated in-app.</p>
          </div>
          <div class="box">
            <h4>Phoenix/Arizona compliance posture</h4>
            <ul>
              <li>Keep driver/vehicle requirements current for Arizona.</li>
              <li>Verify that your vehicle meets regional minimums (including model year and title restrictions).</li>
              <li>Maintain registration, insurance, and inspection compliance as required by Lyft for your region.</li>
            </ul>
          </div>
        </div>

        <h3>2.2 Your in-car “Driver Station” (professional kit)</h3>
        <div class="grid2">
          <div class="box">
            <ul>
              <li>Phone mount (stable, line-of-sight safe).</li>
              <li>Two charging methods + backup power bank.</li>
              <li>Cleanup kit: gloves, bags, paper towels, enzyme cleaner.</li>
              <li>Interior wipes, glass wipes, microfibre cloth.</li>
              <li>Spare water (for driver only), neutral air freshener (subtle).</li>
            </ul>
          </div>
          <div class="box">
            <ul>
              <li>Dashcam (front + cabin recommended; comply with local recording laws).</li>
              <li>Flashlight (night pickups, exterior inspection).</li>
              <li>Basic first-aid kit.</li>
              <li>Disposable seat protectors (optional, high-mess shifts).</li>
              <li>Spare vomit bags (nightlife shifts).</li>
            </ul>
          </div>
        </div>

        <h3>2.3 Pre-shift inspection (2 minutes, every time)</h3>
        <table>
          <thead>
            <tr><th>Category</th><th>Standard</th><th>Failure Cost</th></tr>
          </thead>
          <tbody>
            <tr><td>Fuel/Charge</td><td>Enough for at least 2–3 hours without emergency refuel.</td><td>Missed surges + forced offline time.</td></tr>
            <tr><td>Cabin</td><td>Neutral smell, clear floor, seatbelts visible, trunk usable.</td><td>Low ratings + tips collapse.</td></tr>
            <tr><td>Phone + App</td><td>App updated, GPS stable, mount secure, charging active.</td><td>Missed turns, late pickups, cancellations.</td></tr>
            <tr><td>Heat Management</td><td>AC functional, cabin temperature stable (Phoenix is extreme).</td><td>Comfort complaints + reduced tips.</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card" id="app">
        <h2>3) Lyft Driver App Mastery: The Screens that Control Money</h2>

        <h3>3.1 The offer screen: fast evaluation method</h3>
        <div class="rule">
          <b>Accept offers that increase earnings per hour without inflating cost per mile.</b>
        </div>

        <div class="grid2">
          <div class="box">
            <h4>Scan order (10 seconds)</h4>
            <ol>
              <li>Pickup minutes (unpaid time risk).</li>
              <li>Trip minutes (paid time output).</li>
              <li>Estimated earnings for the ride.</li>
              <li>Dropoff zone quality (demand density after drop).</li>
              <li>Traffic risk (rush hour bottlenecks).</li>
            </ol>
          </div>
          <div class="box">
            <h4>Offer-screen red flags</h4>
            <ul>
              <li>Long pickup distance for low earnings.</li>
              <li>Dropoff far from demand with no reposition plan.</li>
              <li>Complex pickups (events) without adequate compensation.</li>
              <li>Trips that push you into dead zones during high-demand blocks.</li>
            </ul>
          </div>
        </div>

        <h3>3.2 Location filters: steering wheel for your shift</h3>
        <p>Location filters help control which rides you receive by filtering in three ways:</p>
        <div class="grid2">
          <div class="box">
            <h4>Arrive on time</h4>
            <ul>
              <li>Use to protect a stop time while still earning.</li>
              <li>Stops “one last ride” spirals that destroy sleep discipline.</li>
            </ul>
          </div>
          <div class="box">
            <h4>Head to destination</h4>
            <ul>
              <li>Use to drift toward stronger zones or home while working.</li>
              <li>Best used mid-shift when demand is uneven.</li>
            </ul>
          </div>
          <div class="box">
            <h4>Stay within area</h4>
            <ul>
              <li>Use to build momentum inside a dense zone.</li>
              <li>Reduces “pulled out early” drift into low-demand edges.</li>
            </ul>
          </div>
        </div>

        <details>
          <summary>Filter discipline rule-set</summary>
          <ul>
            <li><b>Start-of-shift:</b> Stay within area in a dense zone for 30–60 minutes to build engaged time.</li>
            <li><b>Mid-shift:</b> Head to destination to reposition without going offline.</li>
            <li><b>End-of-shift:</b> Arrive on time to protect your exit and prevent long detours.</li>
          </ul>
        </details>
      </section>

      <section class="card" id="pay">
        <h2>4) Earnings & Pay Control: Understand the Model, Optimize Within It</h2>

        <h3>4.1 Upfront pay logic (decision-ready earnings)</h3>
        <div class="callout">
          Upfront pay displays a ride’s route and total estimated earnings before acceptance. Earnings are influenced by ride characteristics such as estimated time/distance, travel to pickup, and volume of ride requests in the area.
        </div>

        <h3>4.2 The practical earnings mindset</h3>
        <ul>
          <li><b>Hourly output is a function of engaged time:</b> staying busy is more important than chasing a single “big ride.”</li>
          <li><b>Profit is a function of miles:</b> deadhead miles quietly destroy weekly net.</li>
          <li><b>Stability beats spikes:</b> consistent strategy beats random chasing.</li>
        </ul>

        <div class="kpi">
          <div class="stat">
            <div class="label">Core KPI</div>
            <div class="value">Engaged Time %</div>
            <div class="note">Increase by starting in dense zones and reducing long pickups.</div>
          </div>
          <div class="stat">
            <div class="label">Core KPI</div>
            <div class="value">Deadhead Miles</div>
            <div class="note">Reduce by ending rides near demand or using filters to reposition.</div>
          </div>
          <div class="stat">
            <div class="label">Core KPI</div>
            <div class="value">Profit / Working Mile</div>
            <div class="note">Track weekly; protect the car like a revenue asset.</div>
          </div>
        </div>
      </section>

      <section class="card" id="phoenix">
        <h2>5) Phoenix Market Logic: Demand, Heat, Traffic, and Zones</h2>

        <h3>5.1 Phoenix demand spine (high-probability clusters)</h3>
        <ul>
          <li>Downtown Phoenix: events, nightlife, venues, conventions.</li>
          <li>Tempe/ASU: student demand, bars, campus edges.</li>
          <li>Scottsdale/Old Town: nightlife concentration, weekend peaks.</li>
          <li>Major entertainment + shopping corridors: consistent short-trip volume.</li>
          <li>PHX Sky Harbor: travel waves + hotel corridors.</li>
        </ul>

        <h3>5.2 Time blocks and what they reward</h3>
        <table>
          <thead>
            <tr><th>Block</th><th>What you’ll see</th><th>Primary risk</th><th>Primary advantage</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>Morning commute</td>
              <td>Time-sensitive riders, airport runs, shorter consistent trips.</td>
              <td>Traffic bottlenecks.</td>
              <td>Predictable flow; low chaos.</td>
            </tr>
            <tr>
              <td>Midday</td>
              <td>Errands, medical, lunch trips, mixed distance.</td>
              <td>Low-density drift.</td>
              <td>Good for steady engaged time in dense corridors.</td>
            </tr>
            <tr>
              <td>Afternoon commute</td>
              <td>Traffic-heavy; time increases faster than miles.</td>
              <td>Slow mph kills hourly output.</td>
              <td>Positioning wins; choose rides that don’t trap you.</td>
            </tr>
            <tr>
              <td>Night (Thu–Sun strongest)</td>
              <td>Nightlife, event exits, higher tip variance.</td>
              <td>Mess + safety risk.</td>
              <td>High request volume in concentrated zones.</td>
            </tr>
          </tbody>
        </table>

        <div class="danger">
          <b>Phoenix heat rule:</b> cabin comfort is not optional. Heat complaints reduce tips and ratings. Pre-cool the cabin during high-temp months, keep air flow consistent, and avoid aggressive acceleration that intensifies discomfort.
        </div>
      </section>

      <section class="card" id="airport">
        <h2>6) PHX Airport Module: Sky Harbor Pickup + FIFO Queue Operations</h2>

        <h3>6.1 PHX rideshare pickup locations (official structure)</h3>
        <p>Sky Harbor publishes designated rideshare pickup locations by terminal/curb area. Drivers must follow posted instructions and designated zones.</p>

        <div class="ok">
          <b>Airport success is compliance + coordination.</b> Treat airport work as a specialized lane: fewer mistakes, clear scripts, trunk readiness, and strict process.
        </div>

        <h3>6.2 FIFO queue discipline (staging area logic)</h3>
        <div class="callout">
          FIFO (first-in, first-out) queueing is designed to keep airport requests fair. Maintain queue position by following staging rules: stay in the staging area, remain in driver mode, and handle requests without behavior that resets your position.
        </div>

        <div class="grid2">
          <div class="box">
            <h4>Queue position loss triggers</h4>
            <ul>
              <li>Logging out of driver mode.</li>
              <li>Leaving the staging area.</li>
              <li>Denying a FIFO request in many queue designs.</li>
            </ul>
          </div>
          <div class="box">
            <h4>Staging area capacity rule</h4>
            <ul>
              <li>If the staging area is full, you may not be added to the FIFO queue.</li>
              <li>Do not wait elsewhere on airport property while attempting to queue.</li>
            </ul>
          </div>
        </div>

        <details>
          <summary>Airport work: operational checklist</summary>
          <ul>
            <li>Trunk clear for luggage.</li>
            <li>Message on accept: confirm terminal/door/pickup zone.</li>
            <li>Arrive at designated pin/zone; do not improvise outside instructions.</li>
            <li>Keep conversations short; coordinate quickly; reduce curb time.</li>
            <li>Exit airport legally and safely; do not circle terminals for delayed riders.</li>
          </ul>
        </details>
      </section>

      <section class="card" id="pickup">
        <h2>7) Pickup Excellence: The First 60 Seconds Decide Ratings + Tips</h2>

        <h3>7.1 Pin-check protocol (prevents chaos)</h3>
        <ol>
          <li>Confirm pickup type (residential, apartment, venue, airport).</li>
          <li>Choose the best approach route (avoid gated dead-ends).</li>
          <li>If ambiguous, message immediately.</li>
          <li>Upon arrival, use the app’s arrival flow correctly and communicate clearly.</li>
        </ol>

        <h3>7.2 Copy/paste pickup scripts</h3>
        <div class="grid2">
          <div class="box">
            <h4>Standard confirmation</h4>
            <p class="mono">“Hi — I’m your Lyft driver. I’m on the way now. Please be at the pickup pin and ready when I arrive.”</p>
          </div>
          <div class="box">
            <h4>Apartment/complex</h4>
            <p class="mono">“I’m arriving shortly — what building number / gate code should I use? If easier, please meet me at the main entrance.”</p>
          </div>
          <div class="box">
            <h4>Crowded venue</h4>
            <p class="mono">“Pickup is busy — please tell me what you’re wearing and which entrance/corner you’re at. I’m at the pin now.”</p>
          </div>
          <div class="box">
            <h4>Late rider (prevents no-show waste)</h4>
            <p class="mono">“I’m here at the pickup pin. Please come now so we can avoid a cancellation.”</p>
          </div>
        </div>

        <h3>7.3 Waiting time discipline</h3>
        <ul>
          <li>Arrive and message to create a clear record.</li>
          <li>Follow the app’s correct no-show/cancellation steps to protect fee eligibility.</li>
          <li>Do not argue; execute the policy-safe flow.</li>
        </ul>
      </section>

      <section class="card" id="selection">
        <h2>8) Trip Selection Rubric: Accept Like a Strategist</h2>

        <h3>8.1 The 10-second acceptance rubric</h3>
        <table>
          <thead>
            <tr><th>Factor</th><th>Goal</th><th>Why it matters</th></tr>
          </thead>
          <tbody>
            <tr><td>Pickup minutes</td><td>Low relative to earnings</td><td>Pickup is usually unpaid time that compresses hourly output.</td></tr>
            <tr><td>Trip minutes</td><td>High-value paid time</td><td>Paid minutes are your production unit.</td></tr>
            <tr><td>Dropoff zone</td><td>Ends near demand</td><td>Reduces deadhead miles and waiting.</td></tr>
            <tr><td>Traffic risk</td><td>Avoid gridlock traps</td><td>Slow mph lowers earnings per hour even if miles look small.</td></tr>
            <tr><td>Complexity</td><td>Minimize friction</td><td>Events, bars, and confusion increase cancellation and complaint risk.</td></tr>
          </tbody>
        </table>

        <h3>8.2 Common winning patterns</h3>
        <ul>
          <li>Short pickup + medium trip within dense zones.</li>
          <li>Trip ends near other hotspots (stack potential).</li>
          <li>Airport drops during wave times with a realistic reposition plan.</li>
        </ul>

        <h3>8.3 Common losing patterns</h3>
        <ul>
          <li>Long pickup distance for low total earnings.</li>
          <li>Trips that end in low-demand edges with no return value.</li>
          <li>Event pickups without enough pay to cover the time cost.</li>
        </ul>
      </section>

      <section class="card" id="experience">
        <h2>9) Rider Experience System: Professional Without Being Extra</h2>

        <h3>9.1 Five-star operating standards</h3>
        <ul>
          <li>Clean car: neutral scent, clear floor, visible seatbelts.</li>
          <li>Smooth driving: no aggressive braking, no abrupt lane changes.</li>
          <li>Greeting + confirmation: confirm rider name, then drive.</li>
          <li>Quiet by default: match the rider’s energy.</li>
          <li>Temperature control: Phoenix comfort is a competitive advantage.</li>
        </ul>

        <h3>9.2 Conversation rules that prevent complaints</h3>
        <div class="danger">
          Avoid politics, religion, and hostile debates. Short, neutral professionalism protects the account and reduces report risk.
        </div>

        <h3>9.3 Tip probability drivers</h3>
        <ul>
          <li>Fast, accurate pickups (no wasted curb time).</li>
          <li>Clean, comfortable cabin.</li>
          <li>Safe driving behavior.</li>
          <li>Respectful silence when preferred.</li>
        </ul>
      </section>

      <section class="card" id="safety">
        <h2>10) Safety & Risk Management: Protect Life, License, and Account</h2>

        <h3>10.1 In-app safety tools (operational use)</h3>
        <div class="grid2">
          <div class="box">
            <h4>Emergency support flow</h4>
            <ul>
              <li>Use the in-app safety interface to request emergency help when needed.</li>
              <li>In emergencies, call local emergency services immediately.</li>
            </ul>
          </div>
          <div class="box">
            <h4>Share ride details</h4>
            <ul>
              <li>Use safety tools to share ride details with trusted contacts.</li>
              <li>Use automatic sharing for late-night or high-risk blocks.</li>
            </ul>
          </div>
        </div>

        <h3>10.2 High-risk scenarios and control scripts</h3>
        <div class="grid2">
          <div class="box">
            <h4>Too intoxicated / vomit risk</h4>
            <p class="mono">“I can’t start the ride unless you can sit upright and keep the car clean. If you feel sick, we need to cancel so you can get help.”</p>
          </div>
          <div class="box">
            <h4>Too many riders / no seatbelts</h4>
            <p class="mono">“I can only take as many people as there are seatbelts. I can’t move until everyone is buckled.”</p>
          </div>
          <div class="box">
            <h4>Unsafe destination request</h4>
            <p class="mono">“I can’t do that, but I can drop you at the nearest safe public location or you can update the destination in the app.”</p>
          </div>
          <div class="box">
            <h4>Pickup feels unsafe</h4>
            <p class="mono">“I’m unable to complete this pickup. Please request another driver.”</p>
          </div>
        </div>

        <div class="callout">
          <b>Safety rule:</b> one “high-earning” ride is never worth a violent situation, a crash, or a deactivation. Exit early, document cleanly, and preserve the account.
        </div>
      </section>

      <section class="card" id="cancels">
        <h2>11) Cancellations & No-Shows: Fee Eligibility + Policy-Safe Handling</h2>

        <h3>11.1 The correct mindset</h3>
        <ul>
          <li>Follow the driver-facing cancellation/no-show policy flow.</li>
          <li>Message on arrival to create a clear record.</li>
          <li>Use correct reasons and app steps; avoid improvising cancellations.</li>
        </ul>

        <h3>11.2 No-show execution sequence</h3>
        <ol>
          <li>Arrive at pin and confirm exact location.</li>
          <li>Message rider immediately (short, professional).</li>
          <li>Wait the required period per policy/app prompts.</li>
          <li>Complete the in-app no-show flow exactly as instructed.</li>
          <li>Leave safely; reposition to demand.</li>
        </ol>

        <details>
          <summary>Late rider script (low conflict)</summary>
          <p class="mono">“I’m at the pickup pin now. Please come out so we can get moving and avoid a cancellation.”</p>
        </details>
      </section>

      <section class="card" id="damage">
        <h2>12) Damage & Cleaning: Evidence-Driven Protocol</h2>

        <h3>12.1 Damage fees: what they are for</h3>
        <ul>
          <li>Fees support cleaning/repair of affected areas.</li>
          <li>Amounts are assessed case-by-case based on severity and evidence.</li>
          <li>Documentation quality determines outcomes.</li>
        </ul>

        <h3>12.2 Immediate post-incident protocol (do not delay)</h3>
        <ol>
          <li>End the ride safely and legally.</li>
          <li>Take multiple photos: wide + close, high light, clear context.</li>
          <li>Preserve ride details (time, trip record in history).</li>
          <li>Obtain receipts for professional cleaning if required.</li>
          <li>Submit through the correct Lyft reporting channel promptly.</li>
        </ol>

        <div class="danger">
          <b>Rule:</b> emotional conflict reduces documentation quality. Execute the protocol, then reset operations.
        </div>
      </section>

      <section class="card" id="cashflow">
        <h2>13) Getting Paid: Weekly Deposits, Express Pay, Lyft Direct</h2>

        <h3>13.1 Weekly deposits (standard payout rhythm)</h3>
        <ul>
          <li>Weekly transfers are initiated on a set schedule; banking processing impacts arrival time.</li>
          <li>Ensure banking and tax information is complete and accurate to avoid failed transfers.</li>
        </ul>

        <h3>13.2 Express Pay (instant cashout)</h3>
        <ul>
          <li>Cash out earnings to a debit card according to Express Pay rules and minimums.</li>
          <li>Use for cashflow management, not to hide unprofitable driving.</li>
        </ul>

        <h3>13.3 Lyft Direct (earnings access + card account)</h3>
        <ul>
          <li>Lyft Direct provides a business debit card account flow within the driver app.</li>
          <li>Use for faster access to earnings where eligible and useful.</li>
        </ul>

        <div class="callout">
          <b>Cashflow principle:</b> “Faster access” is not the same as “more profit.” Profit is created by trip selection, positioning, and cost control.
        </div>
      </section>

      <section class="card" id="taxes">
        <h2>14) Taxes & Records: Keep More of What You Earn</h2>

        <h3>14.1 Mileage: 2026 standard mileage rate (business)</h3>
        <div class="callout">
          <b>2026 business standard mileage rate:</b> 72.5 cents per mile (IRS).
        </div>

        <h3>14.2 Weekly finance routine (15 minutes)</h3>
        <div class="grid2">
          <div class="box">
            <h4>Every week</h4>
            <ul>
              <li>Record gross earnings.</li>
              <li>Record total working miles (include repositioning miles while working).</li>
              <li>Log expenses: fuel/charging, car wash, supplies, tolls/parking.</li>
              <li>Set aside taxes based on your tax plan.</li>
            </ul>
          </div>
          <div class="box">
            <h4>Performance note</h4>
            <ul>
              <li>Write one improvement target (example: reduce average pickup minutes).</li>
              <li>Write one risk control target (example: no late-night bar pickups without clear ID confirmation).</li>
              <li>Adjust next week’s positioning plan.</li>
            </ul>
          </div>
        </div>
      </section>

      <section class="card" id="benchmarks">
        <h2>15) Benchmarks & KPIs: What “Good” Looks Like</h2>

        <h3>15.1 The improvement order (optimize in sequence)</h3>
        <ol>
          <li><b>Engaged time percentage:</b> reduce idle time; start in dense zones.</li>
          <li><b>Earnings per engaged hour:</b> accept higher-value rides; avoid low-value pickups.</li>
          <li><b>Deadhead miles:</b> end rides near demand; use filters for reposition.</li>
          <li><b>Profit per working mile:</b> track, then protect it with discipline.</li>
          <li><b>Complaint rate:</b> professionalism + safety-first behavior.</li>
        </ol>

        <h3>15.2 Simple KPI formulas</h3>
        <table>
          <thead><tr><th>KPI</th><th>Formula</th><th>Target behavior</th></tr></thead>
          <tbody>
            <tr><td>Engaged Time %</td><td class="mono">Engaged Hours ÷ Online Hours</td><td>Start in dense zones; reduce long pickups.</td></tr>
            <tr><td>Profit / Working Mile</td><td class="mono">(Earnings − Costs) ÷ Working Miles</td><td>Reduce deadhead; protect the vehicle asset.</td></tr>
            <tr><td>Deadhead Ratio</td><td class="mono">Unpaid Miles ÷ Total Working Miles</td><td>Use filters; end rides near hotspots.</td></tr>
            <tr><td>Pickup Drag</td><td class="mono">Avg Pickup Minutes per Ride</td><td>Reject long pickups unless earnings justify.</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card" id="playbooks">
        <h2>16) Daily Playbooks: Run These and Improve Weekly</h2>

        <div class="grid2">
          <div class="box">
            <h3>16.1 The “2-Hour Builder” (momentum shift)</h3>
            <ol>
              <li>Start inside a dense zone (Downtown/Tempe/Old Town depending on time).</li>
              <li>Use “Stay within area” for 30–60 minutes to build engaged time.</li>
              <li>Reject long pickups that compress hourly output.</li>
              <li>After 3–5 trips, reposition to the nearest stronger zone.</li>
              <li>End the 2 hours with a clean exit plan (filters prevent drift).</li>
            </ol>
          </div>

          <div class="box">
            <h3>16.2 The “Airport Professional” (PHX module)</h3>
            <ol>
              <li>Verify official pickup zones and pin behavior.</li>
              <li>Use staging/FIFO rules correctly; protect queue position.</li>
              <li>Message rider: terminal + door + pickup zone confirmation.</li>
              <li>Trunk ready; curb time minimized; professional coordination.</li>
              <li>Do not circle terminals for delayed riders; follow airport rules.</li>
            </ol>
          </div>

          <div class="box">
            <h3>16.3 Night Shift with Guardrails</h3>
            <ol>
              <li>Lock doors until name confirmation.</li>
              <li>Decline riders who are visibly unable to ride safely.</li>
              <li>Keep vomit/cleanup kit accessible.</li>
              <li>Use safety tools and trusted-contact sharing.</li>
              <li>Prioritize safe, well-lit dropoffs; end rides early if needed.</li>
            </ol>
          </div>

          <div class="box">
            <h3>16.4 Commute Shift (traffic-aware)</h3>
            <ol>
              <li>Choose rides that avoid gridlock traps.</li>
              <li>Prefer trips ending near demand corridors.</li>
              <li>Use “Head to destination” to reposition without losing earnings.</li>
              <li>Protect profit per mile; do not “work for free” in heavy traffic.</li>
            </ol>
          </div>
        </div>
      </section>

      <section class="card" id="scripts">
        <h2>17) Communication Templates (Copy/Paste)</h2>

        <h3>17.1 Pickup scripts</h3>
        <div class="grid2">
          <div class="box">
            <h4>Confirm readiness</h4>
            <p class="mono">“Hi — I’m on the way. Please be at the pickup pin and ready when I arrive.”</p>
          </div>
          <div class="box">
            <h4>Pin mismatch</h4>
            <p class="mono">“I’m at the pickup pin shown in the app. Are you at this exact location? If not, please update the pin so I can reach you.”</p>
          </div>
          <div class="box">
            <h4>Gate code / access</h4>
            <p class="mono">“I’m at the entrance — what’s the gate code or best building entry? If easier, please meet me at the main entrance.”</p>
          </div>
          <div class="box">
            <h4>Event pickup</h4>
            <p class="mono">“This area is crowded — please tell me which entrance you’re at and what you’re wearing. I’m at the pickup pin now.”</p>
          </div>
        </div>

        <h3>17.2 Airport scripts</h3>
        <div class="grid2">
          <div class="box">
            <h4>Terminal confirmation</h4>
            <p class="mono">“Please confirm your terminal and door number. I’m heading to the designated rideshare pickup area.”</p>
          </div>
          <div class="box">
            <h4>Pin-level correction</h4>
            <p class="mono">“The app moved the pickup pin to an approved pickup zone. Please go to the pin location and confirm what level you’re on.”</p>
          </div>
        </div>

        <h3>17.3 Safety boundary scripts</h3>
        <div class="grid2">
          <div class="box">
            <h4>Seatbelt compliance</h4>
            <p class="mono">“I can’t drive until everyone is buckled. I can only take as many riders as there are seatbelts.”</p>
          </div>
          <div class="box">
            <h4>Behavior boundary</h4>
            <p class="mono">“I need you to keep the ride calm and respectful. If that can’t happen, I will end the trip at the nearest safe public place.”</p>
          </div>
        </div>
      </section>

      <section class="card" id="nonnegotiables">
        <h2>18) Non-Negotiables That Create Long-Term Success</h2>
        <ul>
          <li><b>Consistency beats luck:</b> repeat schedules and zones until the data proves otherwise.</li>
          <li><b>Trip selection is a skill:</b> accept what strengthens hourly output and cost control.</li>
          <li><b>Documentation beats arguments:</b> photos + timestamps + correct in-app steps.</li>
          <li><b>Safety beats earnings:</b> exit early rather than “push through” a risky situation.</li>
          <li><b>Operate like a business:</b> weekly finance routine, KPI tracking, systematic improvement.</li>
        </ul>
