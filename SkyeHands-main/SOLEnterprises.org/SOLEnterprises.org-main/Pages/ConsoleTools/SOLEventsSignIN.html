<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Launching Event Sign-In…</title>
  <meta name="description" content="Concert-style launch screen that opens the Event Sign-In app in a new tab." />
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#07050f;
      --fg:#f6f2ff;
      --muted:rgba(246,242,255,.7);
      --accent:#a855f7;
      --gold:#f7c948;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 700px at 50% 35%, rgba(168,85,247,.20), transparent 55%),
                  radial-gradient(900px 600px at 20% 70%, rgba(247,201,72,.12), transparent 60%),
                  var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      overflow:hidden;
    }
    .wrap{
      position:relative;
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      position:relative;
      width:min(880px, 92vw);
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      overflow:hidden;
    }
    .topGlow{
      position:absolute; inset:-40% -20% auto -20%;
      height:60%;
      background: radial-gradient(circle at 50% 50%, rgba(168,85,247,.28), transparent 60%),
                  radial-gradient(circle at 30% 70%, rgba(247,201,72,.18), transparent 55%);
      filter: blur(18px);
      pointer-events:none;
    }
    header{
      position:relative;
      padding:22px 22px 12px;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
      font-weight:700;
      letter-spacing:.2px;
      font-size:13px;
      color:rgba(246,242,255,.92);
    }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: conic-gradient(from 120deg, var(--accent), var(--gold), var(--accent));
      box-shadow:0 0 16px rgba(168,85,247,.55);
      animation:pulse 1.1s infinite ease-in-out;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1); opacity:.9}
      50%{transform:scale(1.45); opacity:1}
    }
    .titleBlock{flex:1; min-width:0}
    h1{
      margin:0;
      font-size:clamp(18px, 2.1vw, 28px);
      line-height:1.15;
      letter-spacing:.2px;
    }
    p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .stage{
      position:relative;
      height:360px;
      width:100%;
      border-top:1px solid rgba(255,255,255,.10);
      border-bottom:1px solid rgba(255,255,255,.10);
      background: radial-gradient(800px 380px at 50% 30%, rgba(168,85,247,.16), transparent 60%),
                  radial-gradient(700px 340px at 70% 70%, rgba(247,201,72,.10), transparent 58%),
                  linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.36));
    }
    canvas{display:block; width:100%; height:100%;}
    .controls{
      padding:18px 22px 22px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .btn{
      appearance:none;
      border:0;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      letter-spacing:.2px;
      color:rgba(10,6,20,.95);
      background: linear-gradient(135deg, var(--gold), #ffd77c);
      box-shadow: 0 14px 30px rgba(247,201,72,.18), 0 0 0 1px rgba(255,255,255,.08) inset;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    .btn:hover{transform: translateY(-1px); filter:saturate(1.06)}
    .btn:active{transform: translateY(1px)}
    .btn.secondary{
      background: rgba(0,0,0,.18);
      color: rgba(246,242,255,.92);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:none;
    }
    .hint{
      color: rgba(246,242,255,.66);
      font-size:13px;
    }
    .url{
      color: rgba(246,242,255,.82);
      font-size:12px;
      word-break:break-all;
      opacity:.9;
    }

    .toast{
      position:absolute;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      color: rgba(246,242,255,.86);
      font-size:13px;
      display:none;
      align-items:center;
      gap:10px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
      max-width:min(720px, 92vw);
    }
    .toast.show{display:flex}
    .bar{
      height:6px;
      width:180px;
      border-radius:99px;
      overflow:hidden;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.10);
    }
    .bar > i{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      animation: load 2.8s linear forwards;
    }
    @keyframes load { to { width:100% } }

    .spark{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.35;
      background:
        radial-gradient(circle at 20% 10%, rgba(168,85,247,.20), transparent 22%),
        radial-gradient(circle at 80% 20%, rgba(247,201,72,.16), transparent 24%),
        radial-gradient(circle at 45% 80%, rgba(168,85,247,.14), transparent 26%);
      mix-blend-mode: screen;
      filter: blur(2px);
      animation: drift 6s ease-in-out infinite;
    }
    @keyframes drift{
      0%,100%{transform:translate3d(0,0,0)}
      50%{transform:translate3d(0,-10px,0)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="application" aria-label="Concert launch screen">
      <div class="topGlow"></div>
      <div class="spark"></div>

      <header>
        <div class="badge"><span class="dot"></span> CONCERT LAUNCH</div>
        <div class="titleBlock">
          <h1>Opening your Event Sign-In in a new tab</h1>
          <p>Click <b>Open now</b> to launch your sign-in app in a new tab.</p>
        </div>
      </header>

      <section class="stage">
        <canvas id="c"></canvas>
      </section>

      <section class="controls">
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <button class="btn secondary" id="openBtn" type="button" aria-label="Open sign-in app" disabled>
            ↗ Open now
          </button>
        </div>

        <div style="text-align:right; min-width:240px;">
          <div class="hint">Target URL</div>
          <div class="url" id="urlText"></div>
        </div>
      </section>

      <div class="toast" id="toast" aria-live="polite">
        <span id="toastMsg">Launching…</span>
        <span class="bar" aria-hidden="true"><i></i></span>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const TARGET_URL = "https://v0-event-sign-in-app.vercel.app/";
      const urlText = document.getElementById("urlText");
      const openBtn  = document.getElementById("openBtn");
      const toast = document.getElementById("toast");
      const toastMsg = document.getElementById("toastMsg");

      urlText.textContent = TARGET_URL;

      // ---- Canvas concert animation (simple + lightweight) ----
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d", { alpha: true });

      function resize(){
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr,0,0,dpr,0,0);
      }
      window.addEventListener("resize", resize, { passive:true });
      resize();

      // Crowd + lights state
      let t0 = performance.now();
      let running = true;
      const crowdCols = 64;
      const heads = new Array(crowdCols).fill(0).map((_,i)=>({
        x: (i + 0.5)/crowdCols,
        a: Math.random()*Math.PI*2,
        s: 0.8 + Math.random()*1.2
      }));
      const confetti = [];
      function spawnConfetti(w,h){
        for(let i=0;i<32;i++){
          confetti.push({
            x: Math.random()*w,
            y: -20 - Math.random()*80,
            vx: (Math.random()*2-1)*0.6,
            vy: 0.6 + Math.random()*1.4,
            r: 2 + Math.random()*3,
            rot: Math.random()*Math.PI*2,
            vr: (Math.random()*2-1)*0.06,
            life: 260 + Math.random()*120,
            hue: Math.random()<0.6 ? 275 : 45
          });
        }
      }

      function draw(now){
        if(!running) return;
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const dt = Math.min(0.033, (now - t0)/1000);
        t0 = now;

        ctx.clearRect(0,0,w,h);

        // Back haze
        const haze = ctx.createRadialGradient(w*0.5,h*0.25, 20, w*0.5,h*0.35, h*0.9);
        haze.addColorStop(0, "rgba(168,85,247,0.22)");
        haze.addColorStop(0.45, "rgba(247,201,72,0.10)");
        haze.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0,0,w,h);

        // Stage platform
        ctx.fillStyle = "rgba(0,0,0,0.35)";
        ctx.fillRect(0, h*0.62, w, h*0.12);

        // DJ silhouette
        ctx.save();
        ctx.translate(w*0.5, h*0.62);
        ctx.fillStyle = "rgba(0,0,0,0.72)";
        ctx.beginPath();
        ctx.roundRect(-38, -50, 76, 50, 10);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, -70, 18, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // Moving spotlights (3)
        const time = now * 0.001;
        for(let i=0;i<3;i++){
          const phase = time*0.9 + i*2.0;
          const lx = w*(0.2 + 0.6*(0.5 + 0.5*Math.sin(phase)));
          const topY = -10;
          const baseY = h*0.72;
          const spread = w*0.22;
          const grad = ctx.createLinearGradient(lx, topY, lx, baseY);
          const a = 0.18 + 0.08*Math.sin(phase*1.7);
          const col = i===1 ? `rgba(247,201,72,${a})` : `rgba(168,85,247,${a})`;
          grad.addColorStop(0, col);
          grad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(lx, topY);
          ctx.lineTo(lx - spread, baseY);
          ctx.lineTo(lx + spread, baseY);
          ctx.closePath();
          ctx.fill();
        }

        // Laser line
        ctx.strokeStyle = "rgba(168,85,247,0.45)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        const yL = h*0.50 + Math.sin(time*3.2)*8;
        ctx.moveTo(0, yL);
        ctx.lineTo(w, yL);
        ctx.stroke();

        // Crowd (bouncing heads)
        const crowdTop = h*0.73;
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.beginPath();
        ctx.moveTo(0, h);
        ctx.lineTo(0, crowdTop);
        for(let i=0;i<heads.length;i++){
          const p = heads[i];
          const x = p.x*w;
          const bob = Math.sin(time*4 + p.a) * (8*p.s);
          const y = crowdTop + bob;
          const r = 7 + 4*p.s;
          ctx.quadraticCurveTo(x - r, y - r, x, y);
          ctx.quadraticCurveTo(x + r, y - r, x + r*1.5, y + r*0.2);
        }
        ctx.lineTo(w, crowdTop);
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();

        // Hands (simple spikes)
        ctx.strokeStyle = "rgba(0,0,0,0.92)";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        for(let i=0;i<10;i++){
          const x = (i/9)*w;
          const lift = 18 + (Math.sin(time*3 + i)*10);
          ctx.beginPath();
          ctx.moveTo(x, h);
          ctx.lineTo(x, h - lift);
          ctx.stroke();
        }

        // Confetti
        for(let i=confetti.length-1;i>=0;i--){
          const f = confetti[i];
          f.x += f.vx*60*dt;
          f.y += f.vy*60*dt;
          f.rot += f.vr*60*dt;
          f.life -= 60*dt;
          ctx.save();
          ctx.translate(f.x, f.y);
          ctx.rotate(f.rot);
          ctx.fillStyle = f.hue < 100 ? "rgba(247,201,72,0.85)" : "rgba(168,85,247,0.80)";
          ctx.fillRect(-f.r, -f.r*0.4, f.r*2, f.r*0.8);
          ctx.restore();
          if(f.y > h+30 || f.life <= 0) confetti.splice(i,1);
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);

      // ---- Launch logic (popup-safe approach) ----
      let preOpenedTab = null;
      let launched = false;

      function showToast(message){
        toastMsg.textContent = message;
        toast.classList.add("show");
        // restart the little progress bar animation by replacing it
        const bar = toast.querySelector(".bar");
        bar.innerHTML = "<i></i>";
      }

      function hideToast(){
        toast.classList.remove("show");
      }

      function tryLaunch(){
        if(launched) return;
        launched = true;

        showToast("Concert loading… opening your sign-in tab");

        // confetti burst during launch
        const w = canvas.clientWidth, h = canvas.clientHeight;
        spawnConfetti(w,h);

        // After a short animation window, navigate the pre-opened tab (best against popup blockers)
        setTimeout(() => {
          try{
            if(preOpenedTab && !preOpenedTab.closed){
              preOpenedTab.location.href = TARGET_URL;
              showToast("Opened in a new tab. If you don’t see it, click “Open now”.");
              openBtn.disabled = false;
              openBtn.focus({preventScroll:true});
            } else {
              // Fallback: try opening now (may be blocked)
              const tab = window.open(TARGET_URL, "_blank", "noopener");
              if(tab){
                showToast("Opened in a new tab.");
                openBtn.disabled = false;
              } else {
                showToast("Pop-up blocked. Click “Open now” to launch.");
                openBtn.disabled = false;
              }
            }
          }catch(e){
            showToast("Couldn’t auto-open. Click “Open now”.");
            openBtn.disabled = false;
          }
        }, 2800);

        // Optional: stop the animation after a bit (keeps CPU low)
        setTimeout(() => { running = false; hideToast(); }, 9000);
      }

      openBtn.addEventListener("click", () => {
        const tab = window.open(TARGET_URL, "_blank", "noopener");
        if(!tab){
          alert("Your browser blocked the new tab. Allow pop-ups for this site, then try again.");
        }
      });

      // Keep the concert vibe alive until start is clicked
      setInterval(() => {
        if(!launched){
          const w = canvas.clientWidth, h = canvas.clientHeight;
          if(Math.random() < 0.22) spawnConfetti(w,h);
        }
      }, 900);

      // Small polyfill for roundRect if needed
      if(!CanvasRenderingContext2D.prototype.roundRect){
        CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
          r = Math.min(r, w/2, h/2);
          this.beginPath();
          this.moveTo(x+r, y);
          this.arcTo(x+w, y, x+w, y+h, r);
          this.arcTo(x+w, y+h, x, y+h, r);
          this.arcTo(x, y+h, x, y, r);
          this.arcTo(x, y, x+w, y, r);
          this.closePath();
          return this;
        };
      }
    })();
  </script>
</body>
</html>
