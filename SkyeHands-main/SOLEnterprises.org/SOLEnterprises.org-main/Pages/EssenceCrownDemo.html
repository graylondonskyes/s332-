body { margin:0; background:#0e0e16; font-family:Arial,sans-serif; color:#fff; }
#game-wrapper { display:flex; justify-content:center; padding:20px; }
#board {
  position:relative;
  width:1400px; height:800px;
  background:url('https://cdn1.sharemyimage.com/2026/01/21/ChatGPT-Image-Jan-21-2026-04_24_40-AM.png') no-repeat center center;
  background-size:contain;
}
.zone { position:absolute; display:flex; gap:8px; }
.avatar-zone { height:160px; }
.hand-zone { height:180px; }
.card {
  width:110px; height:150px; border-radius:10px; background:#222; box-shadow:0 6px 14px rgba(0,0,0,.7); cursor:pointer; position:relative; transition:transform .2s ease;
}
.card:hover { transform:scale(1.8); z-index:50; }
.card img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
.card.selected { outline:3px solid gold; }
.attack { animation:attackLunge .4s ease; }
.damage { animation:damageFlash .4s ease; }
@keyframes attackLunge { 0%{transform:translateY(0)} 50%{transform:translateY(-25px)} 100%{transform:translateY(0)} }
@keyframes damageFlash { 0%{filter:none} 50%{filter:brightness(2)} 100%{filter:none} }
#ui { margin-top:12px; text-align:center; }
button { padding:8px 14px; font-size:16px; margin:0 6px; }
#log { margin-top:10px; background:#111; height:140px; overflow:auto; font-size:13px; padding:8px; border-radius:6px; }
svg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.tooltip { position:absolute; background:#222; border:1px solid gold; padding:6px; font-size:12px; border-radius:6px; display:none; z-index:100; }
.target-highlight { outline:3px solid cyan; }
</style>

const opponent={ essence:23, avatars:[cardList[5],cardList[6]], hand:[cardList[5]] };

const tooltip=document.getElementById('tooltip');
const arrows=document.getElementById('arrows');

function log(msg){const l=document.getElementById('log'); l.innerHTML+=msg+'<br>'; l.scrollTop=l.scrollHeight;}

function render(){
  document.getElementById('phase-label').innerText='Phase: '+phases[phaseIndex];
  renderZone('player-avatars',player.avatars,true);
  renderZone('opponent-avatars',opponent.avatars,true);
  renderHand('player-hand',player.hand,true);
  renderHand('opponent-hand',opponent.hand,false,true);
  drawBlocks();
}

function renderZone(id,arr,draggable){
  const z=document.getElementById(id); z.innerHTML='';
  arr.forEach(c=>{
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`<img src="${c.img}">`;
    d.onmouseenter=()=>showTooltip(c);
    d.onmouseleave=()=>hideTooltip();
    if(draggable){
      if(phases[phaseIndex]==='Combat') d.onclick=()=>toggleAttack(c,d);
      else d.onclick=()=>promptAbility(c);
    }
    z.appendChild(d);
    c.el=d;
  });
}

function renderHand(id,hand,draggable,veiled=false){
  const h=document.getElementById(id); h.innerHTML='';
  hand.forEach(c=>{
    const d=document.createElement('div'); d.className='card';
    d.innerHTML=`<img src="${veiled?'https://cdn1.sharemyimage.com/2025/12/02/Back.png':c.img}">`;
    d.onmouseenter=()=>showTooltip(c);
    d.onmouseleave=()=>hideTooltip();
    if(draggable) d.onclick=()=>playCard(c);
    h.appendChild(d);
  });
}

function showTooltip(card){ tooltip.style.display='block'; tooltip.innerHTML=`<b>${card.name}</b><br>P:${card.p} T:${card.t}`; }
function hideTooltip(){ tooltip.style.display='none'; }

function toggleAttack(card,el){
  if(attackers.includes(card)){ attackers=attackers.filter(a=>a!==card); el.classList.remove('selected'); }
  else { attackers.push(card); el.classList.add('selected'); log('Declared '+card.name+' as attacker.'); }
}

function handleBlockSelection(attacker,blocker){
  blocks[attacker.name]=blocker;
  log(blocker.name+' will block '+attacker.name);
  drawBlocks();
}

function drawBlocks(){
  arrows.innerHTML='';
  for(const atkName in blocks){
    const atk=attackers.find(a=>a.name===atkName);
    const blk=blocks[atkName];
    if(atk && blk){
      const ax=atk.el.offsetLeft+atk.el.offsetWidth/2;
      const ay=atk.el.offsetTop+atk.el.offsetHeight/2;
      const bx=blk.el.offsetLeft+blk.el.offsetWidth/2;
      const by=blk.el.offsetTop+blk.el.offsetHeight/2;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',ax); line.setAttribute('y1',ay);
      line.setAttribute('x2',bx); line.setAttribute('y2',by);
      line.setAttribute('stroke','cyan'); line.setAttribute('stroke-width','4');
      arrows.appendChild(line);
    }
  }
}

function promptAbility(card){
  if(confirm('Activate God Code or ability of '+card.name+'?')){
    const target = prompt('Enter target card name or player:');
    log(card.name+' activates ability targeting '+target);
  }
}

function playCard(card){ stack.push(card); log('Played '+card.name+' onto stack.'); }

function resolveStack(){ while(stack.length){ const c=stack.pop(); log('Resolving '+c.name); } }

function nextPhase(){
  if(phases[phaseIndex]==='Combat'){ resolveCombat(); resolveStack(); }
  phaseIndex=(phaseIndex+1)%phases.length;
  if(phases[phaseIndex]==='Combat'){ attackers=[]; blocks={}; arrows.innerHTML=''; }
  render();
}

function resolveCombat(){
  attackers.forEach(a=>{
    const block=blocks[a.name];
    if(block){
      log(a.name+' fights '+block.name);
      a.t -= block.p; block.t -= a.p;
      if(a.t<=0){ player.avatars=player.avatars.filter(av=>av!==a); log(a.name+' is destroyed'); }
      if(block.t<=0){ opponent.avatars=opponent.avatars.filter(av=>av!==block); log(block.name+' is destroyed'); }
    } else { opponent.essence-=a.p; log(a.name+' hits opponent for '+a.p); }
  });
}

render();
</script>
</body>
