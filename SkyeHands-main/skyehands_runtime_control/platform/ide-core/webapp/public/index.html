<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyeHands IDE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1117'/><path d='M8 10l6 6-6 6M16 22h8' stroke='%236366f1' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg0:#0f1117;--bg1:#161b22;--bg2:#1c2330;--bg3:#21262d;
    --border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#6366f1;
    --green:#3fb950;--red:#f85149;--yellow:#e3b341;--blue:#58a6ff;
    --sidebar:240px;--tab-h:38px;--status-h:24px;--toolbar-h:48px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  /* Toolbar */
  #toolbar{height:var(--toolbar-h);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
  #toolbar .brand{font-weight:700;font-size:15px;color:var(--accent);letter-spacing:-.3px;margin-right:8px}
  .tb-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .tb-btn:hover{background:var(--bg2);border-color:var(--accent)}
  .tb-btn svg{flex-shrink:0}
  #toolbar .spacer{flex:1}
  #branch-label{font-size:12px;color:var(--muted);padding:4px 8px;background:var(--bg3);border-radius:4px;border:1px solid var(--border)}
  /* Main layout */
  #main{flex:1;display:flex;overflow:hidden}
  /* Sidebar */
  #sidebar{width:var(--sidebar);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
  #sidebar-header{padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  #sidebar-header button{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;border-radius:3px}
  #sidebar-header button:hover{color:var(--text);background:var(--bg3)}
  #file-tree{flex:1;overflow-y:auto;padding:4px 0}
  .tree-item{display:flex;align-items:center;gap:6px;padding:3px 8px 3px calc(8px + var(--depth)*14px);cursor:pointer;font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none}
  .tree-item:hover{background:var(--bg3);color:var(--text)}
  .tree-item.active{background:rgba(99,102,241,.15);color:var(--text)}
  .tree-item .icon{flex-shrink:0;opacity:.7}
  /* Editor area */
  #editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #tabs{height:var(--tab-h);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;flex-shrink:0}
  #tabs::-webkit-scrollbar{height:3px}
  #tabs::-webkit-scrollbar-track{background:var(--bg1)}
  #tabs::-webkit-scrollbar-thumb{background:var(--border)}
  .tab{display:flex;align-items:center;gap:6px;padding:0 12px;font-size:13px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;min-width:100px;max-width:200px;overflow:hidden}
  .tab:hover{background:var(--bg2);color:var(--text)}
  .tab.active{background:var(--bg0);color:var(--text);border-bottom:2px solid var(--accent)}
  .tab .tab-name{overflow:hidden;text-overflow:ellipsis;flex:1}
  .tab .tab-close{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px;border-radius:3px;flex-shrink:0}
  .tab:hover .tab-close,.tab.active .tab-close{opacity:1}
  .tab .tab-close:hover{color:var(--red);background:var(--bg3)}
  .tab.modified .tab-name::after{content:' ●';color:var(--yellow);font-size:10px}
  #editor-pane{flex:1;overflow:hidden;position:relative}
  #monaco-container{width:100%;height:100%}
  #welcome{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}
  #welcome h2{color:var(--text);font-size:22px;font-weight:600}
  #welcome .shortcuts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:320px;margin-top:8px}
  #welcome .shortcut{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px}
  #welcome .shortcut kbd{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:11px;color:var(--blue)}
  /* Bottom panel */
  #bottom-panel{height:220px;background:var(--bg1);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  #panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 8px;gap:4px}
  .panel-tab{padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .panel-tab:hover{color:var(--text)}
  .panel-tab.active{color:var(--text);border-bottom-color:var(--accent)}
  #panel-content{flex:1;overflow:hidden;position:relative}
  /* Terminal */
  #terminal-panel{position:absolute;inset:0;overflow:hidden;display:none}
  #terminal-panel.active{display:flex;flex-direction:column}
  #terminal-output{flex:1;overflow-y:auto;padding:8px 12px;font-family:'JetBrains Mono','Fira Code','Cascadia Code',monospace;font-size:13px;line-height:1.5;background:var(--bg0)}
  #terminal-input-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid var(--border);background:var(--bg1)}
  #terminal-prompt{color:var(--green);font-family:monospace;font-size:13px;white-space:nowrap}
  #terminal-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:13px;outline:none}
  .term-line{margin:1px 0}
  .term-line.cmd{color:var(--blue)}
  .term-line.out{color:var(--text)}
  .term-line.err{color:var(--red)}
  .term-line.info{color:var(--muted)}
  /* Git panel */
  #git-panel{position:absolute;inset:0;overflow-y:auto;padding:8px 12px;display:none}
  #git-panel.active{display:block}
  #git-panel h4{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 6px}
  #git-status-list{font-family:monospace;font-size:12px;line-height:1.8}
  .git-file{display:flex;align-items:center;gap:8px}
  .git-file .git-badge{width:18px;height:18px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .git-badge.M{background:rgba(227,179,65,.2);color:var(--yellow)}
  .git-badge.A{background:rgba(63,185,80,.2);color:var(--green)}
  .git-badge.D{background:rgba(248,81,73,.2);color:var(--red)}
  .git-badge.Q{background:rgba(88,166,255,.2);color:var(--blue)}
  #git-commit-row{display:flex;gap:8px;margin-top:12px}
  #git-commit-msg{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:13px}
  #git-commit-msg:focus{outline:none;border-color:var(--accent)}
  /* Status bar */
  #status-bar{height:var(--status-h);background:var(--accent);display:flex;align-items:center;padding:0 12px;gap:16px;font-size:11px;flex-shrink:0}
  #status-bar span{opacity:.85}
  #status-bar #status-file{opacity:1;font-weight:500}
  /* Search bar */
  #search-overlay{display:none;position:absolute;top:8px;right:16px;z-index:100;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;gap:8px;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  #search-overlay.active{display:flex}
  #search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;width:220px}
  #search-input:focus{outline:none;border-color:var(--accent)}
  /* Scrollbars */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
  /* Resize handle */
  #resize-h{height:4px;cursor:ns-resize;background:transparent;border-top:1px solid var(--border);flex-shrink:0}
  #resize-h:hover{background:var(--accent)}
  /* New file dialog */
  #new-file-dialog{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
  #new-file-dialog.active{display:flex}
  .dialog-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;width:360px;box-shadow:0 16px 40px rgba(0,0,0,.5)}
  .dialog-box h3{font-size:15px;margin-bottom:16px}
  .dialog-box input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:16px}
  .dialog-box input:focus{outline:none;border-color:var(--accent)}
  .dialog-box .dialog-btns{display:flex;gap:8px;justify-content:flex-end}
  .dialog-box .dialog-btns button{padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border)}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent) !important}
  .btn-cancel{background:var(--bg3);color:var(--muted)}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <span class="brand">⬡ SkyeHands IDE</span>
  <button class="tb-btn" onclick="showNewFileDialog('file')" title="New File (Ctrl+N)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    New File
  </button>
  <button class="tb-btn" onclick="showNewFileDialog('dir')" title="New Folder">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New Folder
  </button>
  <button class="tb-btn" onclick="saveCurrentFile()" title="Save (Ctrl+S)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save
  </button>
  <button class="tb-btn" onclick="runCurrentFile()" title="Run (Ctrl+Enter)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Run
  </button>
  <div class="spacer"></div>
  <span id="branch-label">⎇ main</span>
  <button class="tb-btn" onclick="loadGitStatus()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v2a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><line x1="12" y1="12" x2="12" y2="15"/></svg>
    Git
  </button>
  <a class="tb-btn" href="admin.html" style="text-decoration:none">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Admin
  </a>
</div>

<!-- Main -->
<div id="main">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Explorer</span>
      <button onclick="refreshTree()" title="Refresh">↺</button>
    </div>
    <div id="file-tree"></div>
  </div>

  <!-- Editor area -->
  <div id="editor-area">
    <div id="tabs"></div>
    <div id="editor-pane">
      <div id="welcome">
        <svg width="48" height="48" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="#161b22"/><path d="M8 10l6 6-6 6M16 22h8" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h2>SkyeHands IDE</h2>
        <p style="font-size:13px">Open a file from the Explorer to start editing</p>
        <div class="shortcuts">
          <div class="shortcut"><kbd>Ctrl+S</kbd> Save</div>
          <div class="shortcut"><kbd>Ctrl+N</kbd> New File</div>
          <div class="shortcut"><kbd>Ctrl+`</kbd> Terminal</div>
          <div class="shortcut"><kbd>Ctrl+Enter</kbd> Run File</div>
        </div>
      </div>
      <div id="monaco-container" style="display:none"></div>
    </div>
    <!-- Resize handle -->
    <div id="resize-h"></div>
    <!-- Bottom panel -->
    <div id="bottom-panel">
      <div id="panel-tabs">
        <span class="panel-tab active" onclick="switchPanel('terminal')">Terminal</span>
        <span class="panel-tab" onclick="switchPanel('git')">Git</span>
        <span class="panel-tab" onclick="switchPanel('output')">Output</span>
      </div>
      <div id="panel-content">
        <div id="terminal-panel" class="active">
          <div id="terminal-output">
            <div class="term-line info">SkyeHands IDE Terminal — type commands below</div>
          </div>
          <div id="terminal-input-row">
            <span id="terminal-prompt">sky $</span>
            <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="enter command…">
          </div>
        </div>
        <div id="git-panel">
          <h4>Changes</h4>
          <div id="git-status-list"><span style="color:var(--muted);font-size:12px">Loading…</span></div>
          <div id="git-commit-row">
            <input id="git-commit-msg" type="text" placeholder="Commit message…">
            <button class="tb-btn" onclick="doCommit()">Commit</button>
          </div>
        </div>
        <div id="output-panel" style="position:absolute;inset:0;overflow-y:auto;padding:8px 12px;display:none;font-family:monospace;font-size:13px;line-height:1.6;background:var(--bg0)"></div>
      </div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-file">No file open</span>
  <span id="status-lang"></span>
  <span id="status-cursor"></span>
  <span id="status-msg" style="margin-left:auto"></span>
</div>

<!-- New File Dialog -->
<div id="new-file-dialog">
  <div class="dialog-box">
    <h3 id="dialog-title">New File</h3>
    <input id="new-file-name" type="text" placeholder="filename.js">
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeDialog()">Cancel</button>
      <button class="btn-primary" onclick="createNewItem()">Create</button>
    </div>
  </div>
</div>

<!-- Monaco Editor via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
const API = '/.netlify/functions';
let editor = null;
let openTabs = {}; // path -> { content, language, modified }
let activeTab = null;
let termHistory = [];
let termHistIdx = -1;
let newItemType = 'file';

// ── Monaco init ────────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
require(['vs/editor/editor.main'], () => {
  monaco.editor.defineTheme('sky-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [{ token: '', foreground: 'e6edf3', background: '0f1117' }],
    colors: {
      'editor.background': '#0f1117',
      'editor.lineHighlightBackground': '#161b22',
      'editorLineNumber.foreground': '#30363d',
      'editorLineNumber.activeForeground': '#8b949e',
      'editor.selectionBackground': '#2d3748',
      'editorCursor.foreground': '#6366f1',
      'editor.findMatchBackground': '#30363d',
    }
  });
  editor = monaco.editor.create(document.getElementById('monaco-container'), {
    theme: 'sky-dark',
    fontSize: 14,
    fontFamily: "'JetBrains Mono','Fira Code','Cascadia Code',monospace",
    fontLigatures: true,
    lineHeight: 22,
    minimap: { enabled: window.innerWidth > 1200 },
    scrollBeyondLastLine: false,
    wordWrap: 'off',
    automaticLayout: true,
    tabSize: 2,
    insertSpaces: true,
    renderWhitespace: 'selection',
    bracketPairColorization: { enabled: true },
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    padding: { top: 8, bottom: 8 },
  });
  editor.onDidChangeModelContent(() => {
    if (activeTab && openTabs[activeTab]) {
      openTabs[activeTab].modified = true;
      renderTabs();
    }
  });
  editor.onDidChangeCursorPosition(e => {
    document.getElementById('status-cursor').textContent =
      `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
  });
  // Keyboard shortcuts
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveCurrentFile);
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCurrentFile);
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); showNewFileDialog('file'); }
    if ((e.ctrlKey || e.metaKey) && e.key === '`') { e.preventDefault(); switchPanel('terminal'); document.getElementById('terminal-input').focus(); }
    if (e.key === 'Escape') closeDialog();
  });
  refreshTree();
  setStatus('Ready');
});

// ── File tree ──────────────────────────────────────────────────────────────
async function refreshTree(dir = '') {
  const res = await fetch(`${API}/list-dir?path=${encodeURIComponent(dir)}`);
  if (!res.ok) { setStatus('Error loading files', true); return; }
  const { tree } = await res.json();
  renderTree(tree, document.getElementById('file-tree'), 0);
}

function renderTree(items, container, depth) {
  container.innerHTML = '';
  for (const item of items) {
    const el = document.createElement('div');
    el.className = 'tree-item' + (item.path === activeTab ? ' active' : '');
    el.style.setProperty('--depth', depth);
    if (item.type === 'dir') {
      el.innerHTML = `<span class="icon">📁</span><span>${item.name}</span>`;
      el.onclick = () => toggleDir(el, item, depth);
    } else {
      el.innerHTML = `<span class="icon">${fileIcon(item.name)}</span><span>${item.name}</span>`;
      el.onclick = () => openFile(item.path, el);
    }
    container.appendChild(el);
    if (item.type === 'dir' && item.children?.length) {
      const sub = document.createElement('div');
      sub.className = 'subtree';
      renderTree(item.children, sub, depth + 1);
      container.appendChild(sub);
    }
  }
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { js:'🟨', ts:'🔷', jsx:'⚛️', tsx:'⚛️', html:'🌐', css:'🎨', scss:'🎨', json:'📋', md:'📝', py:'🐍', sh:'⚙️', toml:'⚙️', sql:'🗄️', rs:'🦀', go:'🐹' };
  return icons[ext] || '📄';
}

async function toggleDir(el, item, depth) {
  const next = el.nextElementSibling;
  if (next?.className === 'subtree') {
    next.style.display = next.style.display === 'none' ? '' : 'none';
    el.querySelector('.icon').textContent = next.style.display === 'none' ? '📁' : '📂';
  }
}

// ── File open/save ─────────────────────────────────────────────────────────
async function openFile(filePath, treeEl) {
  if (openTabs[filePath]) { activateTab(filePath); return; }
  try {
    const res = await fetch(`${API}/read-file?path=${encodeURIComponent(filePath)}`);
    if (!res.ok) { setStatus('Cannot read file', true); return; }
    const { content, language } = await res.json();
    openTabs[filePath] = { content, language, modified: false };
    activateTab(filePath);
    document.querySelectorAll('.tree-item').forEach(e => e.classList.remove('active'));
    if (treeEl) treeEl.classList.add('active');
  } catch (err) { setStatus('Error: ' + err.message, true); }
}

function activateTab(filePath) {
  activeTab = filePath;
  const tab = openTabs[filePath];
  const model = monaco.editor.createModel(tab.content, tab.language);
  editor.setModel(model);
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('monaco-container').style.display = 'block';
  const name = filePath.split('/').pop();
  document.getElementById('status-file').textContent = filePath;
  document.getElementById('status-lang').textContent = tab.language;
  renderTabs();
  editor.focus();
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';
  for (const [path, tab] of Object.entries(openTabs)) {
    const name = path.split('/').pop();
    const div = document.createElement('div');
    div.className = 'tab' + (path === activeTab ? ' active' : '') + (tab.modified ? ' modified' : '');
    div.innerHTML = `<span class="tab-name">${fileIcon(name)} ${name}</span><button class="tab-close" onclick="closeTab('${path}',event)">×</button>`;
    div.onclick = () => activateTab(path);
    container.appendChild(div);
  }
}

function closeTab(filePath, e) {
  e.stopPropagation();
  if (openTabs[filePath]?.modified && !confirm('Discard unsaved changes?')) return;
  delete openTabs[filePath];
  if (activeTab === filePath) {
    const remaining = Object.keys(openTabs);
    if (remaining.length) activateTab(remaining[remaining.length - 1]);
    else {
      activeTab = null;
      document.getElementById('welcome').style.display = 'flex';
      document.getElementById('monaco-container').style.display = 'none';
      document.getElementById('status-file').textContent = 'No file open';
      document.getElementById('status-lang').textContent = '';
    }
  }
  renderTabs();
}

async function saveCurrentFile() {
  if (!activeTab || !editor) return;
  const content = editor.getValue();
  try {
    const res = await fetch(`${API}/write-file`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: activeTab, content }),
    });
    if (res.ok) {
      openTabs[activeTab].content = content;
      openTabs[activeTab].modified = false;
      renderTabs();
      setStatus('Saved ✓');
    } else setStatus('Save failed', true);
  } catch (err) { setStatus('Error: ' + err.message, true); }
}

// ── Terminal ───────────────────────────────────────────────────────────────
const termInput = document.getElementById('terminal-input');
const termOutput = document.getElementById('terminal-output');

termInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const cmd = termInput.value.trim();
    if (!cmd) return;
    termHistory.unshift(cmd);
    termHistIdx = -1;
    termInput.value = '';
    appendTermLine(`sky $ ${cmd}`, 'cmd');
    await runTermCmd(cmd);
  }
  if (e.key === 'ArrowUp') {
    termHistIdx = Math.min(termHistIdx + 1, termHistory.length - 1);
    termInput.value = termHistory[termHistIdx] || '';
  }
  if (e.key === 'ArrowDown') {
    termHistIdx = Math.max(termHistIdx - 1, -1);
    termInput.value = termHistIdx < 0 ? '' : termHistory[termHistIdx];
  }
});

async function runTermCmd(cmd) {
  try {
    const res = await fetch(`${API}/exec-command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd }),
    });
    const data = await res.json();
    if (data.error) { appendTermLine('Error: ' + data.error, 'err'); return; }
    if (data.stdout) data.stdout.split('\n').forEach(l => appendTermLine(l, 'out'));
    if (data.stderr) data.stderr.split('\n').forEach(l => appendTermLine(l, 'err'));
    if (data.exitCode !== 0 && data.exitCode !== null) {
      appendTermLine(`[exit ${data.exitCode}]`, 'err');
    }
  } catch (err) { appendTermLine('Network error: ' + err.message, 'err'); }
}

function appendTermLine(text, cls = 'out') {
  const div = document.createElement('div');
  div.className = 'term-line ' + cls;
  div.textContent = text;
  termOutput.appendChild(div);
  termOutput.scrollTop = termOutput.scrollHeight;
}

async function runCurrentFile() {
  if (!activeTab) return;
  await saveCurrentFile();
  switchPanel('terminal');
  const ext = activeTab.split('.').pop();
  let cmd;
  if (['js', 'mjs'].includes(ext)) cmd = `node ${activeTab}`;
  else if (['ts'].includes(ext)) cmd = `npx ts-node ${activeTab}`;
  else if (['py'].includes(ext)) cmd = `python3 ${activeTab}`;
  else if (['sh'].includes(ext)) cmd = `bash ${activeTab}`;
  else { appendTermLine(`Cannot run .${ext} files directly`, 'info'); return; }
  appendTermLine(`sky $ ${cmd}`, 'cmd');
  await runTermCmd(cmd);
}

// ── Git panel ──────────────────────────────────────────────────────────────
async function loadGitStatus() {
  switchPanel('git');
  const res = await fetch(`${API}/git-ops`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'status' }),
  });
  const data = await res.json();
  document.getElementById('branch-label').textContent = '⎇ ' + (data.branch || 'main');
  const list = document.getElementById('git-status-list');
  if (!data.status) {
    list.innerHTML = '<span style="color:var(--muted);font-size:12px">Working tree clean</span>';
    return;
  }
  list.innerHTML = data.status.split('\n').filter(Boolean).map(line => {
    const badge = line[0] !== ' ' ? line[0] : line[1];
    const file = line.slice(3);
    return `<div class="git-file"><span class="git-badge ${badge}">${badge}</span><span style="font-size:12px">${file}</span></div>`;
  }).join('');
}

async function doCommit() {
  const msg = document.getElementById('git-commit-msg').value.trim();
  if (!msg) return;
  const res = await fetch(`${API}/git-ops`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'commit', message: msg }),
  });
  const data = await res.json();
  appendTermLine(data.output || 'Committed', data.ok ? 'out' : 'err');
  document.getElementById('git-commit-msg').value = '';
  loadGitStatus();
  switchPanel('terminal');
}

// ── Panel switching ────────────────────────────────────────────────────────
function switchPanel(name) {
  document.querySelectorAll('.panel-tab').forEach((t, i) => {
    t.classList.toggle('active', ['terminal','git','output'][i] === name);
  });
  document.getElementById('terminal-panel').classList.toggle('active', name === 'terminal');
  document.getElementById('git-panel').classList.toggle('active', name === 'git');
  const out = document.getElementById('output-panel');
  out.style.display = name === 'output' ? 'block' : 'none';
  if (name === 'terminal') document.getElementById('terminal-input').focus();
  if (name === 'git') loadGitStatus();
}

// ── New file dialog ────────────────────────────────────────────────────────
function showNewFileDialog(type) {
  newItemType = type;
  document.getElementById('dialog-title').textContent = type === 'dir' ? 'New Folder' : 'New File';
  document.getElementById('new-file-name').value = '';
  document.getElementById('new-file-dialog').classList.add('active');
  setTimeout(() => document.getElementById('new-file-name').focus(), 50);
}
function closeDialog() {
  document.getElementById('new-file-dialog').classList.remove('active');
}
document.getElementById('new-file-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createNewItem();
  if (e.key === 'Escape') closeDialog();
});
async function createNewItem() {
  const name = document.getElementById('new-file-name').value.trim();
  if (!name) return;
  closeDialog();
  const res = await fetch(`${API}/write-file`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: name, action: newItemType === 'dir' ? 'mkdir' : 'write', content: '' }),
  });
  if (res.ok) {
    setStatus(`Created ${name} ✓`);
    refreshTree();
    if (newItemType === 'file') openFile(name, null);
  } else setStatus('Create failed', true);
}

// ── Resize handle ──────────────────────────────────────────────────────────
const resizeH = document.getElementById('resize-h');
const bottomPanel = document.getElementById('bottom-panel');
let dragging = false, startY = 0, startH = 0;
resizeH.addEventListener('mousedown', e => {
  dragging = true; startY = e.clientY;
  startH = bottomPanel.offsetHeight;
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const delta = startY - e.clientY;
  const newH = Math.max(80, Math.min(600, startH + delta));
  bottomPanel.style.height = newH + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── Status ─────────────────────────────────────────────────────────────────
let statusTimer;
function setStatus(msg, isError = false) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = isError ? 'rgba(248,81,73,.9)' : 'rgba(255,255,255,.7)';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.textContent = '', 3000);
}
</script>
