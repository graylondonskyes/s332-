[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/launchpad"
  to = "/platform-launchpad.html"
  status = 200

[[redirects]]
  from = "/valuation"
  to = "/SkyeHands-Ecosystem-Valuation-2026-04-30.html"
  status = 200

[[redirects]]
  from = "/proof"
  to = "/PROOF_CENTER.html"
  status = 200
