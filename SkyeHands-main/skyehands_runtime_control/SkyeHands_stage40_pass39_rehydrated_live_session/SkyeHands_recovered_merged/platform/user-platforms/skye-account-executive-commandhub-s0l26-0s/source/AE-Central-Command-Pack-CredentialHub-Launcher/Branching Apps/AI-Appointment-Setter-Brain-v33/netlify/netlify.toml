[build]
  publish   = "../static"
  functions = "functions"
  command   = "echo 'no build step'"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/slots"
  to     = "/.netlify/functions/appointment-slots"
  status = 200

[[redirects]]
  from   = "/api/book"
  to     = "/.netlify/functions/appointment-book"
  status = 200

[[redirects]]
  from   = "/api/services"
  to     = "/.netlify/functions/appointment-services"
  status = 200

[[redirects]]
  from   = "/api/admin"
  to     = "/.netlify/functions/appointment-admin"
  status = 200
