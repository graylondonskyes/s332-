<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Printful Commerce Runtime</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0d1020;color:#eef3ff;margin:0;padding:24px}a{color:#b8c7ff}input,button{padding:10px;border-radius:10px;border:1px solid #41508b;background:#151a2d;color:#f5f7ff}button{cursor:pointer}pre{background:#111827;padding:16px;border-radius:14px;overflow:auto} .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center} .card{background:#171d33;border:1px solid #2f3b67;border-radius:18px;padding:18px;max-width:1180px;margin:0 auto 18px} .small{opacity:.8;font-size:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Printful Commerce Runtime</h1>
    <p class="small">CommandHub-connected runtime lane for provider-ready order creation, approval chain, mockup task creation, populated bridge export, contract/replay state, presence/hardening visibility, and incident-safe packaged closure proof.</p>
    <div class="row">
      <label>Runtime Base <input id="runtime-base" size="34" placeholder="http://127.0.0.1:8789" /></label>
      <button id="save-base">Save Runtime Base</button>
      <button id="issue-session">Issue Session</button>
      <button id="run-scenario">Run Closure Scenario</button>
      <button id="run-fulfillment">Run Fulfillment Closure</button>
      <button id="provider-incident">Queue Provider Incident Drill</button>
      <button id="provider-replay">Replay Provider Retry</button>
      <button id="run-mockup">Create Mockup</button>
      <button id="export-bundle">Export Bundle</button>
      <button id="load-summary">Load Summary</button>
    </div>
  </div>
  <div class="card"><pre id="out">Waiting for runtime interaction…</pre></div>
  <script src="../../../../../integration/commandhub-runtime-client.js"></script>
  <script>
    const client = window.SkyeCommandHubRuntimeClient;
    const out = document.getElementById('out');
    const baseInput = document.getElementById('runtime-base');
    baseInput.value = client.runtimeBase() === '/.netlify/functions' ? '' : client.runtimeBase();
    let token = '';
    function show(v){ out.textContent = JSON.stringify(v, null, 2); }
    async function ensureToken(){
      if (token) return token;
      const issued = await client.issueSession({ operatorId:'founder', name:'Skyes Over London', role:'founder', email:'SkyesOverLondonLC@solenterprises.org' });
      token = issued.issued && issued.issued.token || '';
      return token;
    }
    document.getElementById('save-base').onclick = () => { show({runtimeBase: client.setRuntimeBase(baseInput.value.trim())}); };
    document.getElementById('issue-session').onclick = async () => {
      const issued = await client.issueSession({ operatorId:'founder', name:'Skyes Over London', role:'founder', email:'SkyesOverLondonLC@solenterprises.org' });
      token = issued.issued && issued.issued.token || '';
      show(issued);
    };
    document.getElementById('run-scenario').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'runClosureScenario', customer:{ name:'CommandHub Merch Client', company:'Skyes Over London LC', email:'merch@example.com' } }));
    };
    document.getElementById('run-fulfillment').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'runFulfillmentClosure', customer:{ name:'Fulfillment Runtime Client', company:'Skyes Over London LC', email:'fulfillmentruntime@example.com' } }));
    };
    document.getElementById('provider-incident').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'simulateProviderIncident', customer:{ name:'Provider Incident Client', company:'Skyes Over London LC', email:'incidentruntime@example.com' }, reason:'Runtime drill from promoted surface' }));
    };
    document.getElementById('provider-replay').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'replayProviderRetry' }));
    };
    document.getElementById('run-mockup').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'createMockup', productTemplateId:91001, productKey:'premium-tee', variantKey:'tee-black-m', mockVariantId:900001 }));
    };
    document.getElementById('export-bundle').onclick = async () => {
      await ensureToken();
      show(await client.printfulRuntime(token, { action:'exportBundle' }));
    };
    document.getElementById('load-summary').onclick = async () => show(await client.printfulSummary());
  </script>

<script src="/integration/commandhub-devglow-core.js"></script>
<script src="/integration/commandhub-devglow.js"></script>
</body>
</html>
